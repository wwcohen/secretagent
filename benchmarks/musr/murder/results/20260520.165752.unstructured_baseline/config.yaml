llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/musr/murder/llm_cache
evaluate:
  result_dir: benchmarks/musr/murder/results
  expt_name: unstructured_baseline
  root_interface: ptools.answer_question
dataset:
  split: murder_mysteries_val
  shuffle_seed: 42
ptools:
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: prompt_llm
    prompt_template_file: benchmarks/musr/prompt_templates/simplified_unstructured.txt
original_working_dir: benchmarks/musr/murder
