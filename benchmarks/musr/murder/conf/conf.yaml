llm:
  model: gemini/gemini-3.1-flash-lite-preview

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: DEFAULT # means the expt isn't fully configured and should be discarded
  root_interface: ptools.answer_question
dataset:
  split: murder_mysteries_val
  shuffle_seed: 42

ptools:
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: DEFAULT # should raise error
