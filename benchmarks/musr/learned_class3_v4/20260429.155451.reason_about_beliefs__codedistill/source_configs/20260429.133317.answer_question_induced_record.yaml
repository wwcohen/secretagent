llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: answer_question_induced_record
  result_dir: benchmarks/musr/learned_class3_v4/induced_recordings
  entry_point: answer_question
  record_details: true
dataset:
  split: object_placements_train
  shuffle_seed: 42
  'n': 75
ptools:
  react_solve:
    method: simulate_pydantic
    tools:
    - ptools_common.search
    - ptools_common.lookup
    - ptools_common.finish
  answer_question:
    method: simulate_pydantic
    fn: ptools_common.react_answer_impl
    tools:
    - search_context
    - determine_belief_location
    - analyze_narrative_evidence
    - review_search_results
    - reason_about_beliefs
    tool_module: __learned__
    learner: ptool_inducer
learn:
  train_dir: benchmarks/musr/learned_class3_v4
root: benchmarks/musr
