llm:
  model: gemini/gemini-3.1-flash-lite-preview

orchestrate:
  model: gemini/gemini-3.1-pro-preview
  max_retries: 3

cachier:
  cache_dir: llm_cache
  enable_caching: true

evaluate:
  expt_name: team_induced_seed_from_ptools
  result_dir: results
  root_interface: ptools.answer_question
dataset:
  split: team_allocation
  shuffle_seed: 42
  n: 4

ptools:
  extract_index:
    method: simulate
  _analyze_and_summarize_attributes_impl:
    method: simulate
  _seek_specific_individual_information_impl:
    method: simulate
  _define_task_requirements_impl:
    method: simulate
  _analyze_team_allocation_impl:
    method: simulate
  _make_final_allocation_decision_impl:
    method: simulate
  answer_question:
    method: orchestrate
    task_description: >
      Determine the best team allocation. You receive a narrative about
      people with different skills and constraints, a question, and answer
      choices. Use the induced helper ptools to analyze the allocation and
      return the 0-based index of the correct choice.
