llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: object_unstructured_baseline
  result_dir: results
  root_interface: ptools.answer_question
dataset:
  split: object_placements_test
  shuffle_seed: 42

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  infer_belief:
    method: simulate
  answer_question:
    method: simulate
  answer_question_workflow:
    method: direct
