# ReAct + engineered (hand-designed) ptools: pydantic-ai agent over the
# narrative, with the 3 hand-designed object-placement ptools as the
# tool set. Tools: solve_extract_movements, solve_extract_discoveries,
# solve_infer_belief (the agent does NOT need to pass the narrative —
# it is preset on the runtime by react_engineered_answer_impl).
# Test split (seed-42 partition: train=75 / val=75 / test=remainder=106)
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: object_react_engineered
  result_dir: results
  entry_point: answer_question

dataset:
  split: object_placements_test
  shuffle_seed: 42

ptools:
  extract_movements:
    method: simulate
  extract_discoveries:
    method: simulate
  infer_belief:
    method: simulate
  react_solve_engineered:
    method: simulate_pydantic
    tools:
      - ptools_object.solve_extract_movements
      - ptools_object.solve_extract_discoveries
      - ptools_object.solve_infer_belief
  answer_question:
    method: direct
    fn: ptools_common.react_engineered_answer_impl
