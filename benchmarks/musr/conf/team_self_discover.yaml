# Self-Discover baseline (Zhou et al. NeurIPS 2024) on MUSR team allocation.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: team_self_discover
  result_dir: results
  entry_point: answer_question

dataset:
  split: team_allocation_test
  shuffle_seed: 42

self_discover:
  structure_file: self_discover_structures.json
  structure_key: team
  prompt_template_file: prompt_templates/self_discover.txt

ptools:
  answer_question:
    method: direct
    fn: ptools_common.self_discover_answer_impl
