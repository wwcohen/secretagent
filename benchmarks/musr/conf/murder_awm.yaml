# AWM (Agent Workflow Memory) baseline: ReAct agent with a learned NL
# workflow prepended to the prompt. The workflow is induced from
# successful train ReAct trajectories by induce_awm_workflows.py.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: murder_awm
  result_dir: results
  entry_point: answer_question

dataset:
  split: murder_mysteries_test
  shuffle_seed: 42

ptools:
  react_solve:
    method: simulate_pydantic_with_workflow
    workflow_file: awm_workflows.json
    workflow_key: murder
    tools:
      - ptools_common.search
      - ptools_common.lookup
      - ptools_common.finish
  answer_question:
    method: direct
    fn: ptools_common.react_answer_impl
