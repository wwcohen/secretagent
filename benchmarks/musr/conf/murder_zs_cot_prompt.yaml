llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: murder_zs_cot_prompt
  result_dir: results
  entry_point: answer_question

dataset:
  split: murder_mysteries_test
  shuffle_seed: 42

ptools:
  answer_question:
    method: prompt_llm
    prompt_template_file: prompt_templates/zero_shot_cot.txt
