# ReAct + engineered (hand-designed) ptools: pydantic-ai agent over the
# narrative, with the 2 hand-designed team-allocation ptools as the
# tool set. Tools: solve_extract_team_requirements,
# solve_score_team_assignments (the agent does NOT need to pass the
# narrative — it is preset on the runtime by react_engineered_answer_impl).
# Test split (seed-42 partition: train=75 / val=75 / test=remainder=100)
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: team_react_engineered
  result_dir: results
  entry_point: answer_question

dataset:
  split: team_allocation_test
  shuffle_seed: 42

ptools:
  extract_team_requirements:
    method: simulate
  score_team_assignments:
    method: simulate
  react_solve_engineered:
    method: simulate_pydantic
    tools:
      - ptools_team.solve_extract_team_requirements
      - ptools_team.solve_score_team_assignments
  answer_question:
    method: direct
    fn: ptools_common.react_engineered_answer_impl
