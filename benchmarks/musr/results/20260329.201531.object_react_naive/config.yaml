llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  timeout: 300
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: object_react_naive
  result_dir: benchmarks/musr/results
  entry_point: answer_question
  record_details: true
dataset:
  split: object_placements
  shuffle_seed: 42
  'n': 75
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  infer_belief:
    method: simulate
  answer_question:
    method: react
    max_steps: 10
    tools: []
  answer_question_workflow:
    method: direct
