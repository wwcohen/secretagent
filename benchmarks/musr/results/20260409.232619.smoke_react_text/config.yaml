llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: smoke_react_text
  result_dir: benchmarks/musr/results
  entry_point: answer_question
  record_details: true
dataset:
  split: team_allocation_val
  shuffle_seed: 42
  'n': 2
ptools:
  react_solve:
    method: react
    tools:
    - ptools_common.search
    - ptools_common.lookup
    - ptools_common.finish
    max_steps: 6
  answer_question:
    method: direct
    fn: ptools_common.react_answer_impl
