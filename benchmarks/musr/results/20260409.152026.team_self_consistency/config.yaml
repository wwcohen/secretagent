llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: team_self_consistency
  result_dir: benchmarks/musr/results
  entry_point: answer_question
  record_details: true
dataset:
  split: team_allocation_test
  shuffle_seed: 42
self_consistency:
  n_samples: 5
  temperature: 0.7
  prompt_template_file: benchmarks/musr/prompt_templates/zero_shot_cot.txt
ptools:
  answer_question:
    method: direct
    fn: ptools_common.self_consistency_impl
