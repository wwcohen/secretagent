llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: team_cot75
  result_dir: benchmarks/musr/results
  entry_point: answer_question
dataset:
  split: team_allocation
  shuffle_seed: 42
  'n': 75
ptools:
  raw_answer:
    method: prompt_llm
    prompt_template_file: benchmarks/musr/prompt_templates/zero_shot_cot.txt
  extract_index:
    method: match_choice
  extract_profiles:
    method: simulate
  evaluate_allocations:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
