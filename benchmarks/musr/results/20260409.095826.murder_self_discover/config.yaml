llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: murder_self_discover
  result_dir: benchmarks/musr/results
  entry_point: answer_question
  record_details: true
dataset:
  split: murder_mysteries_test
  shuffle_seed: 42
self_discover:
  structure_file: benchmarks/musr/self_discover_structures.json
  structure_key: murder
  prompt_template_file: benchmarks/musr/prompt_templates/self_discover.txt
ptools:
  answer_question:
    method: direct
    fn: ptools_common.self_discover_answer_impl
