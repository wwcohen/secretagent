llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 65536
orchestrate:
  model: gemini/gemini-3.1-pro-preview
  max_retries: 3
cachier:
  cache_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr/llm_cache
  enable_caching: true
echo:
  orchestrate: true
evaluate:
  expt_name: rc_iter4_eval
  result_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr/results/orchestration_learner
  entry_point: answer_question_workflow
  max_workers: 1
  record_details: false
dataset:
  split: murder_mysteries
  shuffle_seed: 42
  'n': 10
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
    task_description: 'Solve a murder mystery. You receive a narrative, a question
      about who committed the murder, and a list of answer choices. Use the available
      tools to extract suspects and evidence from the narrative, verify alibis, deduce
      the murderer, then return the 0-based index of the correct answer choice.

      '
    fn: ptools_murder.answer_question_workflow_orchestrated_seed
root: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr
