llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: team_awm_judge_v1
  result_dir: benchmarks/musr/results
  entry_point: answer_question
dataset:
  split: team_allocation_test
  shuffle_seed: 42
ptools:
  react_solve:
    method: simulate_pydantic_with_workflow
    workflow_file: benchmarks/musr/awm_workflows_judge_v1.json
    workflow_key: team
    tools:
    - ptools_common.search
    - ptools_common.lookup
    - ptools_common.finish
  answer_question:
    method: direct
    fn: ptools_common.react_answer_impl
