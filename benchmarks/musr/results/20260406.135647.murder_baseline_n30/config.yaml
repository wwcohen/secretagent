llm:
  model: together_ai/Qwen/Qwen3.5-9B
  max_tokens: 4096
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: murder_baseline_n30
  result_dir: benchmarks/musr/results
  entry_point: answer_question
  record_details: true
dataset:
  split: murder_mysteries
  shuffle_seed: 42
  'n': 30
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: simulate
  answer_question_workflow:
    method: direct
