llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 8192
cachier:
  cache_dir: benchmarks/rulearena/llm_cache
evaluate:
  result_dir: benchmarks/rulearena/results
  expt_name: workflow_gemini_flash_lite
  max_workers: 4
dataset:
  domain: tax
  split: valid
  complexity: all
  shuffle_seed: 137
  'n': 10
ptools:
  extract_airline_params:
    method: simulate
  extract_tax_params:
    method: simulate
  extract_nba_params:
    method: simulate
  compute_airline_calculator:
    method: direct
    fn: ptools._airline_calc_fn
  compute_tax_calculator:
    method: direct
    fn: ptools._tax_calc_fn
  compute_rulearena_answer:
    method: direct
    fn: ptools.l1_extract_workflow
