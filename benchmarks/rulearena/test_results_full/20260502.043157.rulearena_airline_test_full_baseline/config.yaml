llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_tokens: 8192
cachier:
  cache_dir: benchmarks/rulearena/llm_cache
evaluate:
  result_dir: benchmarks/rulearena/test_results_full
  expt_name: rulearena_airline_test_full_baseline
  record_details: true
dataset:
  domain: airline
  split: test
  complexity: all
  shuffle_seed: 137
  'n': 50
ptools:
  extract_airline_params:
    method: simulate_pydantic
  extract_tax_params:
    method: simulate_pydantic
  extract_nba_params:
    method: simulate_pydantic
  compute_airline_calculator:
    method: direct
    fn: ptools._airline_calc_fn
  compute_tax_calculator:
    method: direct
    fn: ptools._tax_calc_fn
  compute_rulearena_answer:
    method: direct
    fn: ptools.l1_extract_workflow
root: benchmarks/rulearena
