# DesignBench ReAct+VLM baseline (tools: generate, render preview, fix from screenshots).
llm:
  model: Qwen/Qwen3.5-9B

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: react_baseline
  entry_point: generate_code
  record_details: true

dataset:
  framework: vanilla
  shuffle_seed: 42
  max_reference_chars: 20000

benchmark:
  output_framework: null
  skip_eval: false
  case_timeout_seconds: 120

vlm:
  max_tokens: 2048
  timeout_seconds: 45
  retries: 5
  retry_sleep_seconds: 5.0
  enable_thinking: false
  enabled: true

echo:
  model: false
  llm_input: false
  llm_output: false

ptools:
  generate_code:
    method: react
    max_steps: 20
    tools:
      - ptools.generate_code.func
      - ptools.render_generated_image
      - ptools.fix_code_from_rendered_and_reference
  render_generated_image:
    method: direct
  fix_code_from_rendered_and_reference:
    method: simulate
