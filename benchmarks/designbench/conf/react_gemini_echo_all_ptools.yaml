# DesignBench **ReAct** (``method: react``): Thought / Action / Observation loop
# with Gemini + VLM. Bind leaf ptools first (same ordering habit as
# ``benchmarks/medcalc/conf/react.yaml``), then the entry tool. ``propose_code``
# is the VLM one-shot codegen action; ``render_generated_image`` is ``direct`` (runs
# ``_render_generated_image_code`` in-process, no LLM).
#
# Not the React UI framework.
#
# Example:
#   uv run python expt.py run --config-file conf/react_gemini_echo_all_ptools.yaml dataset.n=3
llm:
  model: gemini/gemini-3-flash-preview

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: react_gemini_echo_all_ptools
  entry_point: generate_code
  record_details: true

dataset:
  framework: vanilla
  shuffle_seed: 42
  max_reference_chars: 20000

benchmark:
  output_framework: null
  skip_eval: false
  case_timeout_seconds: 120

vlm:
  provider: gemini
  max_tokens: 8192
  timeout_seconds: 120
  retries: 3
  retry_sleep_seconds: 2.0
  enable_thinking: false
  enabled: true

echo:
  model: false
  llm_input: false
  llm_output: false

ptools:
  propose_code:
    method: vlm
    prompt_mode: unstructured
    output_mode: freeform
    user_text: "The webpage screenshot:\n"
  render_generated_image:
    method: direct
  fix_code_from_rendered_and_reference:
    method: vlm
    prompt_mode: unstructured
    output_mode: freeform
    user_text: ""
  generate_code:
    method: react
    max_steps: 20
    tools:
      - ptools.propose_code
      - ptools.render_generated_image
      - ptools.fix_code_from_rendered_and_reference
