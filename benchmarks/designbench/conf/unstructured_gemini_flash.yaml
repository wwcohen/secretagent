# DesignBench unstructured VLM via Gemini 3 Flash (litellm + GEMINI_API_KEY).
# https://ai.google.dev/gemini-api/docs/models/gemini-3-flash-preview
# Run: uv run python expt.py run --config-file conf/unstructured_gemini_flash.yaml dataset.n=2
llm:
  model: gemini/gemini-3-flash-preview

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: unstructured_gemini3_flash
  entry_point: generate_code
  record_details: true

dataset:
  framework: vanilla
  shuffle_seed: 42
  max_reference_chars: 20000

benchmark:
  output_framework: null
  skip_eval: false
  case_timeout_seconds: 120

vlm:
  provider: gemini
  max_tokens: 8192
  timeout_seconds: 120
  retries: 3
  retry_sleep_seconds: 2.0
  enable_thinking: false
  enabled: true

echo:
  model: false
  llm_input: false
  llm_output: false

ptools:
  generate_code:
    method: vlm
    prompt_mode: unstructured
    output_mode: freeform
    user_text: "The webpage screenshot:\n"
