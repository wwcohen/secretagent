llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/results
  expt_name: workflow_gemini_flash_lite
  entry_point: meeting_planning
  prompt_trace: true
  max_workers: 4
dataset:
  split: meeting
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 10
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_meeting_info:
    method: simulate
  plan_visit_order:
    method: simulate
  build_meeting_plan:
    method: simulate
  meeting_planning:
    method: direct
    fn: ptools_meeting.meeting_workflow
