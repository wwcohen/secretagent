llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/results
  expt_name: gemini_flash_lite_minibatch
  entry_point: trip_planning
  prompt_trace: true
  max_workers: 4
dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 4
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_trip_constraints:
    method: simulate
  find_valid_route:
    method: simulate
  build_trip_plan:
    method: simulate
  trip_planning:
    method: simulate
--minibatch: null
