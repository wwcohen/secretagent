llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180  # seconds; prevents hang on stalled HTTP calls

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: DEFAULT
  entry_point: calendar_scheduling
  prompt_trace: true

dataset:
  split: calendar
  shuffle_seed: 42
  prompt_mode: 0shot
  n: 4
  stratified: false
  sample_n: 50
  sample_seed: 42

ptools:
  parse_schedules:
    method: simulate
  find_available_slots:
    method: simulate
  select_and_format:
    method: simulate
  calendar_scheduling:
    method: DEFAULT
