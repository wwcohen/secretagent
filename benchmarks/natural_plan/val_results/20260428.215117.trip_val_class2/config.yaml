llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/val_results
  expt_name: trip_val_class2
  entry_point: trip_planning
  prompt_trace: true
dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 30
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_trip_constraints:
    method: simulate
  find_valid_route:
    method: simulate
  build_trip_plan:
    method: simulate
  trip_planning:
    method: learned_code
    learner: workflow_distill
    backoff: false
learn:
  train_dir: benchmarks/natural_plan/learned_class2_v3
