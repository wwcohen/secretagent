llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/learned_class3_v3/induced_recordings
  expt_name: calendar_scheduling_induced_record
  entry_point: calendar_scheduling
  prompt_trace: true
  record_details: true
dataset:
  split: calendar
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 50
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: train
ptools:
  parse_schedules:
    method: simulate
  find_available_slots:
    method: simulate
  select_and_format:
    method: simulate
  calendar_scheduling:
    method: simulate_pydantic
    tools:
    - propose_meeting_time
    - propose_meeting_time_2
    tool_module: __learned__
    learner: ptool_inducer
learn:
  train_dir: benchmarks/natural_plan/learned_class3_v3
root: benchmarks/natural_plan
