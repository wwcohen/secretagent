llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180  # seconds; prevents hang on stalled HTTP calls

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: DEFAULT
  entry_point: meeting_planning
  prompt_trace: true

dataset:
  split: meeting
  shuffle_seed: 42
  prompt_mode: 0shot
  n: 4
  stratified: false
  sample_n: 50
  sample_seed: 42

ptools:
  parse_meeting_info:
    method: simulate
  plan_visit_order:
    method: simulate
  build_meeting_plan:
    method: simulate
  meeting_planning:
    method: DEFAULT
