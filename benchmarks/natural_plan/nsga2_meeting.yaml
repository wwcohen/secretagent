# NSGA-II search space for natural_plan meeting_planning.
# Run from repo root:
#   uv run -m secretagent.cli.optimize nsga2 \
#     --space-file benchmarks/natural_plan/nsga2_meeting.yaml \
#     --cwd benchmarks/natural_plan \
#     --pop-size 12 --n-gen 5 --timeout 1200 \
#     dataset.split=meeting dataset.partition=valid dataset.n=50
#
# Methods scoped to what natplan currently supports out-of-the-box (no react /
# pot / wf_orch in conf/, and no orch_learner under learned/meeting/). If those
# get ported later, mirror the musr/nsga2_team.yaml shape.

command: uv run python expt.py run --config-file conf/meeting.yaml

models:
  - together_ai/deepseek-ai/DeepSeek-V3.1
  - together_ai/deepseek-ai/DeepSeek-V3
  - together_ai/openai/gpt-oss-20b
  - together_ai/openai/gpt-oss-120b
  - gemini/gemini-2.5-flash
  - gemini/gemini-2.5-flash-lite

methods:
  structured_baseline:
    - ptools.meeting_planning.method=simulate
  zs_cot:
    - ptools.meeting_planning.method=prompt_llm
    - ptools.meeting_planning.prompt_template_file=prompt_templates/meeting_zs_cot.txt
  workflow:
    - ptools.meeting_planning.method=direct
    - ptools.meeting_planning.fn=ptools_meeting.meeting_workflow
