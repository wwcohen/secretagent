llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: musr_murder_train_train_full
  result_dir: benchmarks/musr/recordings_full
  entry_point: answer_question_workflow
  record_details: true
dataset:
  split: murder_mysteries_train
  shuffle_seed: 42
  'n': 75
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
root: benchmarks/musr
