llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: musr_object_train_full
  result_dir: benchmarks/musr/recordings_full
  entry_point: answer_question_workflow
  record_details: true
dataset:
  split: object_placements_train
  shuffle_seed: 42
  'n': 75
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_movements:
    method: simulate
  extract_discoveries:
    method: simulate
  infer_belief:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
root: benchmarks/musr
