llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/date_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/date_understanding/recordings_full
  expt_name: bbh_date_understanding_train_train_full
  record_details: true
dataset:
  split: train
  shuffle_seed: 137
  'n': 75
ptools:
  extract_options:
    method: simulate
  extract_date_facts:
    method: simulate
  extract_question:
    method: simulate
  make_inference:
    method: simulate
  answer_question:
    method: simulate
  match_option:
    method: simulate
  answer_date_question:
    method: direct
    fn: ptools.zeroshot_unstructured_workflow
  answer_date_question_orchestrated:
    method: direct
    fn: ptools.zeroshot_unstructured_workflow
root: benchmarks/bbh/date_understanding
