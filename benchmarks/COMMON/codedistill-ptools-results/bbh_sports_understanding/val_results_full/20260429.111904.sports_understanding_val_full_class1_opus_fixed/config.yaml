llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/sports_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/sports_understanding/val_results_full
  expt_name: sports_understanding_val_full_class1_opus_fixed
dataset:
  split: valid
  shuffle_seed: 137
  'n': 75
ptools:
  analyze_sentence:
    method: simulate
  sport_for:
    method: learned_code
    backoff: true
    learner: codedistill
  consistent_sports:
    method: learned_code
    backoff: true
    learner: codedistill
  are_sports_in_sentence_consistent:
    method: direct
    fn: ptools.sports_understanding_workflow
learn:
  train_dir: benchmarks/bbh/sports_understanding/learned_opus
root: benchmarks/bbh/sports_understanding
