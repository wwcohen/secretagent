llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/recordings_full
  expt_name: natplan_meeting_train_train_full
  entry_point: meeting_planning
  prompt_trace: true
  record_details: true
dataset:
  split: meeting
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: train
ptools:
  parse_meeting_info:
    method: simulate
  plan_visit_order:
    method: simulate
  build_meeting_plan:
    method: simulate
  meeting_planning:
    method: direct
    fn: ptools_meeting.meeting_workflow
root: benchmarks/natural_plan
