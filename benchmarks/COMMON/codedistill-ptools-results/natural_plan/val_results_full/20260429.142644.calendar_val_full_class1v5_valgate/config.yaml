llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/val_results_full
  expt_name: calendar_val_full_class1v5_valgate
  entry_point: calendar_scheduling
  prompt_trace: true
dataset:
  split: calendar
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_schedules:
    method: simulate
  find_available_slots:
    method: simulate
  select_and_format:
    method: learned_code
    backoff: true
    learner: codedistill
  calendar_scheduling:
    method: direct
    fn: ptools_calendar.calendar_workflow
learn:
  train_dir: benchmarks/natural_plan/learned_v5_valgate
root: benchmarks/natural_plan
