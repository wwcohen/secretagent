llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/val_results_full
  expt_name: meeting_val_full_class1_opus_force
  entry_point: meeting_planning
  prompt_trace: true
  record_details: true
dataset:
  split: meeting
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_meeting_info:
    method: learned_code
    learner: codedistill
    backoff: true
  plan_visit_order:
    method: learned_code
    learner: codedistill
    backoff: true
  build_meeting_plan:
    method: simulate
  meeting_planning:
    method: direct
    fn: ptools_meeting.meeting_workflow
learn:
  train_dir: benchmarks/natural_plan/learned_opus
root: benchmarks/natural_plan
