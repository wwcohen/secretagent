llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/tabmwp/llm_cache
evaluate:
  expt_name: unstructured_baseline
  result_dir: benchmarks/tabmwp/results
  record_details: true
dataset:
  split: test
  shuffle_seed: 42
  'n': 100
ptools:
  zeroshot_tabmwp_solve:
    method: prompt_llm
    prompt_template_file: benchmarks/tabmwp/prompt_templates/zeroshot.txt
  tabmwp_solve:
    method: direct
    fn: ptools.zeroshot_unstructured_workflow
root: benchmarks/tabmwp
