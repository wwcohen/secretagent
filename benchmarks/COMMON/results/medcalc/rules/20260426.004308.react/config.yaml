llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results
  expt_name: react
  entry_point: calculate_medical_value
  max_workers: 8
dataset:
  split: test
  stratified: false
  'n': null
  shuffle_seed: 42
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  calculate_medical_value:
    method: simulate_pydantic
    tools:
    - ptools.identify_calculator
    - ptools.extract_clinical_values
    - ptools.compute_calculation
root: benchmarks/medcalc
medcalc_partition:
  name: rules
  source: benchmarks/results/medcalc/test/20260426.004308.react
  categories: ['diagnosis', 'risk', 'severity']
