llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results
  expt_name: pot
  entry_point: calculate_medical_value
  max_workers: 8
dataset:
  split: test
  stratified: false
  'n': null
  shuffle_seed: 42
ptools:
  extract_clinical_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  pot_medical_value:
    method: program_of_thought
    tools:
    - ptools.extract_clinical_values
    - ptools.compute_calculation
  calculate_medical_value:
    method: direct
    fn: ptools.pot_workflow
root: benchmarks/medcalc
medcalc_partition:
  name: formulas
  source: benchmarks/results/medcalc/test/20260426.034741.pot
  categories: ['dosage', 'lab test', 'physical']
