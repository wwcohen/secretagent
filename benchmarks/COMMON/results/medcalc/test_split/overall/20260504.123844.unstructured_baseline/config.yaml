llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results
  expt_name: unstructured
  entry_point: calculate_medical_value
  max_workers: 8
dataset:
  split: test
  stratified: false
  'n': null
  shuffle_seed: 42
ptools:
  calculate_medical_value:
    method: prompt_llm
    prompt_template_file: benchmarks/medcalc/prompt_templates/unstructured.txt
    answer_pattern: <answer>\s*(.*?)\s*</answer>
root: benchmarks/medcalc
