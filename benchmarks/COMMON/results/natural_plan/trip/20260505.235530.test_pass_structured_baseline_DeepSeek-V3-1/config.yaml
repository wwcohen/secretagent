llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/results
  expt_name: test_pass_structured_baseline_DeepSeek-V3-1
  entry_point: trip_planning
  prompt_trace: true
dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 50
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: test
ptools:
  parse_trip_constraints:
    method: simulate
  find_valid_route:
    method: simulate
  build_trip_plan:
    method: simulate
  trip_planning:
    method: simulate
root: benchmarks/natural_plan
