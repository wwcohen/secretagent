llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results
  expt_name: react_engineered
  entry_point: calculate_medical_value
dataset:
  split: test
  stratified: true
  'n': 100
  shuffle_seed: 42
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  calculate_medical_value:
    method: react_pydantic
    tools:
    - ptools.identify_calculator
    - ptools.extract_clinical_values
    - ptools.compute_calculation
    preamble: You compute a medical value from a patient note and a question. Use
      the available tools to identify the right calculator, extract clinical values,
      and run the calculation. Return the final numeric value as the structured output.
      Stop calling tools after deciding.
root: benchmarks/medcalc
