llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
cachier:
  cache_dir: benchmarks/musr/llm_cache
  enable_caching: false
evaluate:
  expt_name: murder_react_engineered
  result_dir: benchmarks/musr/results
  entry_point: answer_question
dataset:
  split: murder_mysteries_test
  shuffle_seed: 42
  'n': 100
ptools:
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  react_solve_engineered:
    method: react_pydantic
    preamble: Answer the following multiple-choice question using the available tools.
      Read each tool's docstring before deciding which to call; the narrative is already
      loaded into the runtime so tools that need it will receive it automatically.
      After enough evidence, return the 0-based answer index as a short string (e.g.
      "0", "1", "2"). Stop calling tools after deciding.
    tools:
    - ptools_murder.solve_extract_suspects
    - ptools_murder.solve_verify_alibis
    - ptools_murder.solve_deduce_murderer
  answer_question:
    method: direct
    fn: ptools_common.react_engineered_answer_impl
root: benchmarks/musr
