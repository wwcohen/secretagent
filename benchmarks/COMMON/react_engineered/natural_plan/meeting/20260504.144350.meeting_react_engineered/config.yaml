llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/results
  expt_name: meeting_react_engineered
  entry_point: meeting_planning
  prompt_trace: true
dataset:
  split: meeting
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
ptools:
  parse_meeting_info:
    method: simulate
  plan_visit_order:
    method: simulate
  build_meeting_plan:
    method: simulate
  meeting_planning:
    method: react_pydantic
    preamble: Answer the planning task using the available tools. Each tool has a
      docstring describing its purpose. After enough evidence, return your final plan
      as the structured output. Stop calling tools after producing the answer.
    tools:
    - ptools_meeting.parse_meeting_info
    - ptools_meeting.plan_visit_order
    - ptools_meeting.build_meeting_plan
root: benchmarks/natural_plan
