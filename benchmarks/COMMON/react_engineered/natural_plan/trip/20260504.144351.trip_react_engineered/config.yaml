      docstring describing its purpose. After enough evidence, return your final plan
      as the structured output. Stop calling tools after producing the answer.
    tools:
    - ptools_trip.parse_trip_constraints
    - ptools_trip.find_valid_route
    - ptools_trip.build_trip_plan
root: /Users/lexl/Research_group/secretagent/benchmarks/natural_plan
