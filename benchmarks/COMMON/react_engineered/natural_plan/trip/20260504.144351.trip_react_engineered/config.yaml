llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  timeout: 180
cachier:
  cache_dir: /Users/lexl/Research_group/secretagent/benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: /Users/lexl/Research_group/secretagent/benchmarks/natural_plan/results
  expt_name: trip_react_engineered
  entry_point: trip_planning
  prompt_trace: true
dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
ptools:
  parse_trip_constraints:
    method: simulate
  find_valid_route:
    method: simulate
  build_trip_plan:
    method: simulate
  trip_planning:
    method: react_pydantic
