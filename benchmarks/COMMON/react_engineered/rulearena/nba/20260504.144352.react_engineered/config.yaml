llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_tokens: 8192
  timeout: 600
cachier:
  cache_dir: benchmarks/rulearena/nba/llm_cache
evaluate:
  result_dir: benchmarks/rulearena/nba/results
  expt_name: react_engineered
dataset:
  split: test
  shuffle_seed: 42
ptools:
  extract_nba_params:
    method: simulate
  compute_nba_answer:
    method: react_pydantic
    preamble: Determine whether any NBA team operation violates CBA salary cap rules
      using the available tools. Read each tool docstring before calling. Return 1.0
      if any violation exists, 0.0 if all operations comply. Stop calling tools after
      deciding.
    tools:
    - ptools.extract_nba_params
root: benchmarks/rulearena/nba
