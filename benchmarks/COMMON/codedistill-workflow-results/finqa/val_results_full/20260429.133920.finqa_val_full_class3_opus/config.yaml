llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/finqa/llm_cache
evaluate:
  result_dir: benchmarks/finqa/val_results_full
  expt_name: finqa_val_full_class3_opus
  record_details: true
dataset:
  split: valid
  shuffle_seed: null
  'n': 100
ptools:
  parse_table:
    method: direct
  compute:
    method: direct
  extract_reasoning_plan:
    method: simulate
  extract_final_number:
    method: simulate
  answer_finqa:
    method: learned_code
    fn: ptools.answer_finqa_workflow
    learner: workflow_distill
    backoff: true
learn:
  train_dir: benchmarks/finqa/learned_class3_opus
root: benchmarks/finqa
