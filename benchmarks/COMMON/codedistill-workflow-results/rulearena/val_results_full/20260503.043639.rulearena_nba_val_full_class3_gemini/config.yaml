llm:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_tokens: 8192
  timeout: 600
cachier:
  cache_dir: benchmarks/rulearena/nba/llm_cache
evaluate:
  result_dir: benchmarks/rulearena/nba/val_results_full
  expt_name: rulearena_nba_val_full_class3_gemini
  record_details: true
dataset:
  split: valid
  shuffle_seed: 137
  'n': 42
ptools:
  extract_nba_params:
    method: simulate_pydantic
  compute_nba_answer:
    method: learned_code
    learner: workflow_distill
    backoff: true
learn:
  train_dir: benchmarks/COMMON/codedistill-workflow-results/rulearena/learned_class3_gemini_nba
root: benchmarks/rulearena/nba
