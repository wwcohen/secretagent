llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/date_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/date_understanding/val_results_full
  expt_name: date_understanding_val_full_class2_opus
dataset:
  split: valid
  shuffle_seed: 137
  'n': 75
ptools:
  extract_options:
    method: simulate
  extract_date_facts:
    method: simulate
  extract_question:
    method: simulate
  make_inference:
    method: simulate
  answer_question:
    method: simulate
  match_option:
    method: simulate
  answer_date_question:
    method: learned_code
    learner: workflow_distill
    backoff: true
  answer_date_question_orchestrated:
    method: direct
    fn: ptools.zeroshot_unstructured_workflow
learn:
  train_dir: benchmarks/bbh/date_understanding/learned_class2_opus
root: benchmarks/bbh/date_understanding
