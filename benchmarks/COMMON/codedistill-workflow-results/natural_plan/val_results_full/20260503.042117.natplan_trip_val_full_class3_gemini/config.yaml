llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  timeout: 180
cachier:
  cache_dir: benchmarks/natural_plan/llm_cache
evaluate:
  result_dir: benchmarks/natural_plan/val_results_full
  expt_name: natplan_trip_val_full_class3_gemini
  entry_point: trip_planning
  prompt_trace: true
  record_details: true
dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  'n': 100
  stratified: false
  sample_n: 50
  sample_seed: 42
  partition: valid
ptools:
  parse_trip_constraints:
    method: simulate
  find_valid_route:
    method: simulate
  build_trip_plan:
    method: simulate
  trip_planning:
    method: learned_code
    learner: workflow_distill
    backoff: true
learn:
  train_dir: benchmarks/COMMON/codedistill-workflow-results/natural_plan/learned_class3_gemini_trip
root: benchmarks/natural_plan
