llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
orchestrate:
  model: together_ai/Qwen/Qwen3.5-9B
  max_retries: 3
cachier:
  cache_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr/llm_cache
  enable_caching: true
echo:
  orchestrate: true
evaluate:
  expt_name: test_deepseek_v3_1
  result_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/orchestrator-results/seed_from_ptools/musr_murder
  entry_point: answer_question_workflow
  record_details: true
  max_workers: 4
dataset:
  split: murder_mysteries_test
  shuffle_seed: 42
  'n': null
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
    task_description: 'Solve a murder mystery. You receive a narrative, a question
      about who committed the murder, and a list of answer choices. Use the available
      tools to extract suspects and evidence from the narrative, verify alibis, deduce
      the murderer, then return the 0-based index of the correct answer choice.

      '
    fn: __learned__.answer_question_workflow_orchestrated_seed
    learner: orch_learner
learn:
  train_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/orchestrator-results/_train_dirs/seed_from_ptools/musr_murder
root: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr
