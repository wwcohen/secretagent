llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/COMMON/orchestrator-results/seed_from_ptools/medcalc
  expt_name: test_deepseek_v3_1
  entry_point: calculate_medical_value
  record_details: true
  max_workers: 16
dataset:
  split: test
  stratified: false
  'n': null
  shuffle_seed: 42
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  analyze_scoring_conditions:
    method: simulate
  extract_calculator_values:
    method: simulate
  repair_missing_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: __learned__.calculate_medical_value_orchestrated_seed
    learner: orch_learner
learn:
  train_dir: benchmarks/COMMON/orchestrator-results/_train_dirs/seed_from_ptools/medcalc
root: benchmarks/medcalc
