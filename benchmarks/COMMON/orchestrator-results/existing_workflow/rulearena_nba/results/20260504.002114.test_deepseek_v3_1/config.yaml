llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 8192
cachier:
  cache_dir: benchmarks/rulearena/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/COMMON/orchestrator-results/existing_workflow/rulearena_nba
  expt_name: test_deepseek_v3_1
  entry_point: compute_rulearena_answer
  record_details: true
  max_workers: 4
dataset:
  domain: nba
  split: test
  complexity: all
  shuffle_seed: 137
  'n': 0
ptools:
  extract_airline_params:
    method: simulate_pydantic
  extract_tax_params:
    method: simulate_pydantic
  extract_nba_params:
    method: simulate_pydantic
  compute_airline_calculator:
    method: direct
    fn: ptools._airline_calc_fn
  compute_tax_calculator:
    method: direct
    fn: ptools._tax_calc_fn
  compute_rulearena_answer:
    method: direct
    fn: __learned__.l1_extract_workflow
    learner: orch_learner
learn:
  train_dir: benchmarks/COMMON/orchestrator-results/_train_dirs/existing_workflow/rulearena_nba
root: benchmarks/rulearena
