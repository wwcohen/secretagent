llm:
  model: together_ai/openai/gpt-oss-20b
cachier:
  cache_dir: benchmarks/bbh/penguins_in_a_table/llm_cache
evaluate:
  result_dir: benchmarks/bbh/penguins_in_a_table/results
  expt_name: workflow_codedistill
dataset:
  split: valid
  shuffle_seed: 137
ptools:
  analyze_input:
    method: simulate
  table_operation:
    method: learned_code
    learner: codedistill
    backoff: true
  answer_question:
    method: simulate
  choose_response:
    method: learned_code
    learner: codedistill
    backoff: true
  answer_penguin_question:
    method: direct
    fn: ptools.penguins_workflow
learn:
  train_dir: benchmarks/bbh/penguins_in_a_table/learned
