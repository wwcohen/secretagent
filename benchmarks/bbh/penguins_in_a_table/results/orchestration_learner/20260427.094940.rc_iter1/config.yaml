llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/bbh/penguins_in_a_table/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/bbh/penguins_in_a_table/results/orchestration_learner
  expt_name: rc_iter1
  max_workers: 1
  entry_point: answer_penguin_question
  record_details: true
dataset:
  split: valid
  shuffle_seed: 137
ptools:
  analyze_input:
    method: simulate
  table_operation:
    method: simulate
  answer_question:
    method: simulate
  choose_response:
    method: simulate
  answer_penguin_question:
    method: direct
    fn: ptools.answer_penguin_question_orchestrated_seed
orchestrate:
  model: gemini/gemini-3.1-pro-preview
root: benchmarks/bbh/penguins_in_a_table
