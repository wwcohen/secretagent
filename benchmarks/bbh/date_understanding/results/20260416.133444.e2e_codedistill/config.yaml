llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/date_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/date_understanding/results
  expt_name: e2e_codedistill
dataset:
  split: valid
  shuffle_seed: 137
ptools:
  find_date_from_sentence:
    method: simulate
  normalize_date_order:
    method: simulate
  find_time_difference:
    method: simulate
  identify_time_difference:
    method: simulate
  adjust_date_by_hours:
    method: simulate
  parse_question:
    method: simulate
  select_closest_option:
    method: simulate
  answer_date_question:
    method: learned_code
    learner: e2e_codedistill
    backoff: false
    sandbox: false
  answer_date_question_orchestrated:
    method: simulate
learn:
  train_dir: benchmarks/bbh/date_understanding/learned
