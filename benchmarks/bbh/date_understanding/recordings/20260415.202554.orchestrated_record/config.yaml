llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/date_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/date_understanding/recordings
  expt_name: orchestrated_record
  record_details: true
dataset:
  split: train
  shuffle_seed: 137
ptools:
  find_date_from_sentence:
    method: simulate
  normalize_date_order:
    method: simulate
  find_time_difference:
    method: simulate
  identify_time_difference:
    method: simulate
  adjust_date_by_hours:
    method: simulate
  parse_question:
    method: simulate
  select_closest_option:
    method: simulate
  answer_date_question:
    method: simulate
  answer_date_question_orchestrated:
    method: orchestrate
echo:
  orchestrate: true
orchestrate:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_retries: 3
