llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/sports_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/sports_understanding/results
  expt_name: e2e_codedistill
dataset:
  split: valid
  shuffle_seed: 137
ptools:
  analyze_sentence:
    method: simulate
  sport_for:
    method: simulate
  consistent_sports:
    method: simulate
  are_sports_in_sentence_consistent:
    method: learned_code
    learner: e2e_codedistill
    backoff: false
learn:
  train_dir: benchmarks/bbh/sports_understanding/learned
