llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/bbh/sports_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/sports_understanding/results
  expt_name: pot
  root_interface: ptools.are_sports_in_sentence_consistent
dataset:
  split: valid
  shuffle_seed: 137
  json_data_dir: benchmarks/bbh/sports_understanding/data
ptools:
  analyze_sentence:
    method: simulate
  sport_for:
    method: simulate
  consistent_sports:
    method: simulate
  are_sports_in_sentence_consistent:
    method: program_of_thought
    tools:
    - ptools.analyze_sentence
    - ptools.sport_for
    - ptools.consistent_sports
original_working_dir: benchmarks/bbh/sports_understanding
