    method: simulate
  sport_for:
    method: simulate
  consistent_sports:
    method: simulate
  are_sports_in_sentence_consistent:
    method: direct
    fn: ptools.zeroshot_unstructured_workflow
original_working_dir: benchmarks/bbh/sports_understanding
