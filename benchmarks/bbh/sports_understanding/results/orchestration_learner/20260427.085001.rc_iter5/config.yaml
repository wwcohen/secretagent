llm:
  model: gemini/gemini-3.1-flash-lite-preview
cachier:
  cache_dir: benchmarks/bbh/sports_understanding/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/bbh/sports_understanding/results/orchestration_learner
  expt_name: rc_iter5
  max_workers: 1
  entry_point: are_sports_in_sentence_consistent
  record_details: true
dataset:
  split: valid
  shuffle_seed: 137
ptools:
  analyze_sentence:
    method: simulate
  sport_for:
    method: simulate
  consistent_sports:
    method: simulate
  are_sports_in_sentence_consistent:
    method: direct
    fn: ptools.are_sports_in_sentence_consistent_orchestrated_seed
orchestrate:
  model: gemini/gemini-3.1-pro-preview
root: benchmarks/bbh/sports_understanding
