llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/bbh/sports_understanding/llm_cache
evaluate:
  result_dir: benchmarks/bbh/sports_understanding/results-test
  expt_name: react
dataset:
  split: test
  shuffle_seed: 137
ptools:
  analyze_sentence:
    method: simulate
  sport_for:
    method: simulate
  consistent_sports:
    method: simulate
  are_sports_in_sentence_consistent:
    method: simulate_pydantic
    tools:
    - ptools.analyze_sentence
    - ptools.sport_for
    - ptools.consistent_sports
root: benchmarks/bbh/sports_understanding
