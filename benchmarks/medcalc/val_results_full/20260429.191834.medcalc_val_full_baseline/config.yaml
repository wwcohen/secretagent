llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/val_results_full
  expt_name: medcalc_val_full_baseline
  entry_point: calculate_medical_value
  record_details: true
dataset:
  split: test
  stratified: true
  'n': 100
  shuffle_seed: 42
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  analyze_scoring_conditions:
    method: simulate
  extract_calculator_values:
    method: simulate
  repair_missing_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: ptools.workflow
root: benchmarks/medcalc
