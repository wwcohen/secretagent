llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 65536
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results
  expt_name: baseline_strat2_test_gate
  entry_point: calculate_medical_value
  max_workers: 8
dataset:
  split: test
  stratified: true
  'n': 110
  shuffle_seed: 42
ptools:
  calculate_medical_value:
    method: prompt_llm
    prompt_template_file: benchmarks/medcalc/prompt_templates/baseline.txt
    answer_pattern: (?:ANSWER|answer|Answer)[:\s]*([-\d.eE+]+)
root: benchmarks/medcalc
