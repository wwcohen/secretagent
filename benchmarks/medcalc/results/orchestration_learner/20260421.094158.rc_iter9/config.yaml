llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 65536
  timeout: 300
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results/orchestration_learner
  expt_name: rc_iter9
  entry_point: calculate_medical_value
  record_details: true
  max_workers: 10
  case_timeout: 300
dataset:
  split: train
  stratified: true
  'n': null
  shuffle_seed: 42
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  analyze_scoring_conditions:
    method: simulate
  extract_calculator_values:
    method: simulate
  repair_missing_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: ptools.workflow
