llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 65536
  thinking: true
  reasoning_effort: high
simulate_pydantic:
  template: simulate_pydantic_thinking.txt
cachier:
  cache_dir: benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: benchmarks/medcalc/results/benchmark_eval
  expt_name: equation_orchfix_existing_benchmark
  entry_point: calculate_medical_value
  record_details: false
  max_workers: 4
dataset:
  split: train
  category_filter: equation
  stratified: false
  'n': null
  shuffle_seed: 42
ptools:
  calculate_medical_value:
    method: simulate_pydantic
    tools: __all__
    tool_module: ptools_evolved
root: benchmarks/medcalc
