llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 65536
  thinking: true
  reasoning_effort: high
simulate_pydantic:
  template: simulate_pydantic_thinking.txt
cachier:
  cache_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/medcalc/llm_cache
  enable_caching: true
evaluate:
  result_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/medcalc/results
  expt_name: react_train_rule_4pc
  entry_point: calculate_medical_value
  record_details: true
  max_workers: 4
dataset:
  split: train
  stratified: true
  'n': 110
  shuffle_seed: 42
  category_filter: rule
  per_calculator_n: 4
  per_calculator_skip: 0
ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  calculate_medical_value:
    method: simulate_pydantic
    tools:
    - ptools.identify_calculator
    - ptools.extract_clinical_values
    - ptools.compute_calculation
root: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/medcalc
