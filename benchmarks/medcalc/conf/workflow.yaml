# L4: Workflow — Python-orchestrated multi-stage with specialist LLM agents
llm:
  model: together_ai/Qwen/Qwen3.5-9B
  max_tokens: 16384

cachier:
  cache_dir: llm_cache
  enable_caching: true

evaluate:
  result_dir: results
  expt_name: workflow
  entry_point: calculate_medical_value

dataset:
  split: train
  stratified: true
  n: null
  shuffle_seed: 42

ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: ptools.workflow
