# Self-improvement config for MedCalc pipeline
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 16384

improve:
  model: together_ai/Qwen/Qwen3.5-397B-A17B

orchestrate:
  model: together_ai/Qwen/Qwen3.5-397B-A17B

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  result_dir: results
  expt_name: self_improve
  entry_point: calculate_medical_value
  record_details: true

dataset:
  split: train
  stratified: true
  n: null
  shuffle_seed: 42

ptools:
  identify_calculator:
    method: simulate
  extract_clinical_values:
    method: simulate
  reason_about_scoring:
    method: simulate
  extract_values_with_context:
    method: simulate
  repair_missing_values:
    method: simulate
  compute_calculation:
    method: direct
    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: direct
    fn: ptools.pipeline_workflow
