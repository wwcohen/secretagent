# OrchestrationLearner config for rule-only MedCalc induced ptools.
llm:
  model: gemini/gemini-3.1-flash-lite-preview
  max_tokens: 65536
  thinking: true
  reasoning_effort: high

simulate_pydantic:
  template: simulate_pydantic_thinking.txt

cachier:
  cache_dir: llm_cache
  enable_caching: true

evaluate:
  result_dir: results
  expt_name: induced_orch_rule
  entry_point: calculate_medical_value
  record_details: true

dataset:
  split: train
  category_filter: rule
  stratified: true
  n: null
  shuffle_seed: 42

ptools:
  calculate_medical_value:
    method: simulate_pydantic
    tools: __all__
    tool_module: ptools_induced_rule
