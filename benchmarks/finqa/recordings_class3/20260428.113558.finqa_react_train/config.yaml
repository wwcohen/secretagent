llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/finqa/llm_cache
evaluate:
  result_dir: benchmarks/finqa/recordings_class3
  expt_name: finqa_react_train
  record_details: true
dataset:
  split: train
  shuffle_seed: null
  'n': 50
ptools:
  parse_table:
    method: direct
  lookup_cell:
    method: direct
  compute:
    method: direct
  extract_reasoning_plan:
    method: simulate
  extract_final_number:
    method: simulate
  answer_finqa:
    method: simulate_pydantic
    tools:
    - ptools.call_parse_table
    - ptools.call_lookup_cell
    - ptools.call_compute
    - ptools.call_extract_reasoning_plan
