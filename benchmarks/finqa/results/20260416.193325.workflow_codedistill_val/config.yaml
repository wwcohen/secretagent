llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
cachier:
  cache_dir: benchmarks/finqa/llm_cache
evaluate:
  result_dir: benchmarks/finqa/results
  expt_name: workflow_codedistill_val
dataset:
  split: val
  shuffle_seed: null
  'n': 100
ptools:
  parse_table:
    method: direct
  compute:
    method: direct
  extract_reasoning_plan:
    method: simulate
  extract_final_number:
    method: learned_code
    learner: codedistill
    backoff: true
  answer_finqa:
    method: direct
    fn: ptools.answer_finqa_workflow
learn:
  train_dir: benchmarks/finqa/learned
