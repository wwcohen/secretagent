terface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_work n_TABLE_STORE: dict[str, dict] = {}\n\n\ndef load_table_store(dataset_dict: dict) -> None:\n    \"\"\"Populate the table store from the raw dataset dict.\n\n    Called by expt.py before running experiments.\n    \"\"\"\n    _TABLE_STORE.clear()\n    for ex_id, ex in dataset_dict.items():\n        _TABLE_STORE[ex_id] = {\n            \"table\": ex[\"table\"],\n            \"table_for_pd\": ex[\"table_for_pd\"],\n            \"table_title\": ex.get(\"table_title\"),\n        }\n\n\n# ---------------------------------------------------------------\n# Top-level interface\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem. Return the answer as a string.\n\n    Arguments:\n      question: the math word problem text\n      table: the table as pipe-delimited text (header row + data rows)\n      table_id: identifier for lookup via tool interfaces\n      choices: list of answer options for multi-choice, or None for free-text\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Shared reasoning interfaces (used by both Option A and Option B)\n# ---------------------------------------------------------------\n\n@interface\ndef identify_operation(question: str, table_description: str) -> str:\n    \"\"\"Determine what math operation is needed to answer the question.\n\n    Given the question and a description of the table (column names,\n    row count, title), identify the operation: lookup, sum, difference,\n    average, median, count, comparison, min, max, argmin, argmax, range, multiply, proportion, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer(question: str, table: str, operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation to answer the question.\n\n    Arguments:\n      question: the original math word problem\n      table: the full table text, for context\n      operation: the identified operation (e.g. \"sum\", \"average\", \"multiply\")\n      values: the values extracted from the table\n\n    Use the question and table context to perform the correct math:\n    - For argmax/argmin questions (e.g. \"Which person\", \"Which day\"), return the entity NAME, not the numeric value.\n    - For purchasing multiple items, MULTIPLY the extracted unit prices by the quantities stated in the question.\n    - For budgets, compute the TOTAL cost of all items and compare to the budget (return yes/no if asked).\n    - For stem-and-leaf plots, correctly combine the stem and leaf into a single number (e.g. stem 9, leaf 0 -> 90).\n    - For rate of change, ensure the sign is correct (later value minus earlier value).\n    - For probability/proportion, compute the correct fraction.\n    \n    Return ONLY the final computed result as a clean, concise string (no units, no equations, no explanation).\n    \"\"\"\n\n\n@interface\ndef format_answer(result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option A: in-context table interfaces\n# ---------------------------------------------------------------\n\n@interface\ndef extract_relevant_values(question: str, table: str) -> list[str]:\n    \"\"\"Given the full table in context, extract the specific values\n    needed to answer the question.\n\n    Read the table carefully, identify which rows and columns are\n    relevant to the question, and return their values as a list\n    of strings.\n    - If a condition applies to multiple rows, extract values from ALL matching rows nterface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(question, table, operation, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identify_operation(question, schema)\n\n    # Use extract_relevant_values with the full table text to determine\n    # which values are needed, then compute\n    full_table = query_table(table_id)\ --\n# Top-level interface\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem. Return the answer as a string.\n\n    Arguments:\n      question: the math word problem text\n      table: the table as pipe-delimited text (header row + data rows)\n      table_id: identifier for looking up the table via tool interfaces\n      choices: list of answer options for multi-choice, or None for free-text\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Shared reasoning interfaces (used by both Option A and Option B)\n# ---------------------------------------------------------------\n\n@interface\ndef identify_operation(question: str, table_description: str) -> str:\n    \"\"\"Determine what math operation is needed to answer the question.\n\n    Given the question and a description of the table (column names,\n    row count, title), identify the operation:\n    - lookup (for finding a single value or a frequency)\n    - sum (for adding values, or total frequency)\n    - difference (for subtracting, or finding amount left)\n    - multiply (for total cost of multiple items)\n    - average (mean)\n    - median (middle value)\n    - count (counting rows, NOT for reading a frequency)\n    - comparison (greater/less, budget affordability, shortage/surplus)\n    - min / max (lowest/highest numerical value)\n    - argmin / argmax (finding the LABEL/name associated with min/max)\n    - range (max minus min)\n    - probability (favorable / total)\n    - rate of change (final - initial)\n    - or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer(operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    Arguments:\n      operation: the operation to perform\n      values: the values extracted from the table and question\n\n    Rules:\n    - \"argmax\" / \"argmin\": return the LABEL (name/day/person) with the highest/lowest value. If a label has multiple values, sum them first.\n    - \"multiply\" / \"sum\": For total costs, multiply quantities by unit prices before summing.\n    - \"difference\": subtract the values. If finding amount left, subtract total costs from the budget.\n    - \"median\": sort numbers numerically and return the middle value.\n    - \"comparison\": For budgets, total cost <= budget means \"yes\" (affordable). For shortage/surplus, demand > supply is \"shortage\", supply > demand is \"surplus\".\n    - \"range\": maximum minus minimum.\n    - \"probability\": favorable / total. Return as a simplified fraction.\n    - \"rate of change\": final value minus initial value.\n    - \"count\": if the values are frequencies extracted from a table, SUM them instead of counting the items.\n    - Handle fractions properly (e.g., 1/5 = 0.2, 4+4/5 = 4.8).\n\n    Return ONLY the computed result as a clean string.\n    \"\"\"\n\n\n@interface\ndef format_answer(result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option A: in-context table interfaces\n# ---------------------------------------------------------------\n\n@interface\ndef extract_relevant_values(question: str, table: str) -> list[str]:\n    \"\"\"Given the full table in context, extract the specific values needed.\n\n    Read the table and question carefully. Return a list of strings.\n\n    CRITICAL INSTRUCTIONS:\n    1. MISSING QUANTITIES: If the question contains specific quantities or budgets (e.g. \"buy 6\", \"1/5 of a pound\", \"has $55\"), you MUST include those numbers in your list.\n    2. ARGMIN/ARGMAX: If asking WHICH item/day/person, include BOTH the labels (e.g. names/days) AND their corresponding numbers.\n    3. STEM-AND-LEAF: Combine the stem and leaf into the actual full numbers (e.g., stem 9, leaf 0 -> \"90\").\n    4. CONTEXT LABELS: For comparisons (budgets, shortage/surplus) or probabilities, include short context labels (e.g. \"budget: $55\", \"demanded: 4200\", \"favorable: 5\") so the numbers' roles are clear.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option B: tool-based table access interfaces (direct implementations)\n# ---------------------------------------------------------------\n\n@interface\ndef get_table_schema(table_id: str) -> str:\n    \"\"\"Return the table schema: column names, row count, and table title.\n\n    Does NOT return actual data values. Use lookup_value or query_column\n    to retrieve data.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    title = info[\"table_title\"] or \"(no title)\"\n    columns = \", \".join(df.columns.tolist())\n    return f\"Title: {title}\\nColumns: {columns}\\nRows: {len(df)}\"\n\n\n@interface\ndef lookup_value(table_id: str, row_label: str, column: str) -> str:\n    \"\"\"Look up a specific cell value by row label and column name.\n\n    The row_label is matched against the first column of the table.\n    Returns the cell value as a string, or 'NOT FOUND' if no match.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    first_col = df.columns[0]\n    mask = df[first_col].str.strip().str.lower() == row_label.strip().lower()\n    if mask.any() and column in df.columns:\n        return str(df.loc[mask, column].iloc[0])\n    return \"NOT FOUND\"\n\n\n@interface\ndef query_column(table_id: str, column: str) -> list[str]:\n    \"\"\"Return all values in a given column as a list of strings.\n\n    Returns an empty list if the column name is not found.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    if column in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Wrapper that converts inputs for the PoT interface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identify_operation(question, schema)\n\n    # Use extract_relevant_values with the full table text to determine\n    # which values are needed, then compute\n    values = extract_relevant_values(question, query_table(table_id))\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\n# ---------------------------------------------------------------\n# Workflow improvement experiments\n# ---------------------------------------------------------------\n\n# --- Experiment: workflow_broad (fewer, broader ptools) ---\n\n@interface\ndef extract_and_compute(question: str, table: str) -> str:\n    \"\"\"Given a question and a table, extract the relevant values and\n    compute the answer in a single step.\n\n    Read the table carefully, determine what operation is needed\n    (lookup, sum, difference, average, count, comparison, etc.),\n    extract the relevant values, perform the calculation, and return\n    the result as a string.\n\n    Return ONLY the computed value, no units or explanation.\n    \"\"\"\n\n\ndef broad_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"2-step workflow: extract_and_compute -> format_answer.\"\"\"\n    result = extract_and_compute(question, table)\n    return format_answer(result, choices)\n\n\n# --- Experiment: workflow_rich (full context at every step) ---\n\n@interface\ndef identify_operation_rich(question: str, table: str) -> str:\n    \"\"\"Given the full question and table, determine what math operation\n    is needed to answer the question.\n\n    Read both the question and the table data carefully.\n    Identify the operation: lookup, sum, difference, average, count,\n    comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer_rich(question: str, table: str, operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    You also receive the original question and table for full context.\n\n    Arguments:\n      question: the original math word problem\n      table: the full table as pipe-delimited text\n      operation: the operation to perform (e.g. \"sum\", \"average\", \"difference\")\n      values: the numeric or text values extracted from the table\n\n    Return the computed result as a string.\n    \"\"\"\n\n\n@interface\ndef format_answer_rich(question: str, table: str, result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    You also receive the original question and table for full context.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\ndef rich_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"4-step workflow where every ptool receives full question + table context.\"\"\"\n    operation = identify_operation_rich(question, table)\n    values = extract_relevant_values(question, table)\n    result = compute_answer_rich(question, table, operation, values)\n    return format_answer_rich(question, table, result, choices)\n\n# --- Auto-generated by orchestration_learner --seed-orchestrate ---\ndef tabmwp_solve_orchestrated_seed(question: str, table: str, table_id: str, choices: list | None) -> str:\n    table_description = get_table_schema(table_id)\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n</ptools_file>", "outcome": "ROLLED BACK\naccuracy: 55.7% -> 0.0%\ncos strings.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option B: tool-based table access interfaces (direct implementations)\n# ---------------------------------------------------------------\n\n@interface\ndef get_table_schema(table_id: str) -> str:\n    \"\"\"Return the table schema: column names, row count, and table title.\n\n    Does NOT return actual data values. Use lookup_value or query_column\n    to retrieve data.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    title = info[\"table_title\"] or \"(no title)\"\n    columns = \", \".join(df.columns.tolist())\n    return f\"Title: {title}\\nColumns: {columns}\\nRows: {len(df)}\"\n\n\n@interface\ndef lookup_value(table_id: str, row_label: str, column: str) -> str:\n    \"\"\"Look up a specific cell value by row label and column name.\n\n    The row_label is matched against the first column of the table.\n    Returns the cell value as a string, or 'NOT FOUND' if no match.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    first_col = df.columns[0]\n    mask = df[first_col].str.strip().str.lower() == row_label.strip().lower()\n    if mask.any() and column in df.columns:\n        return str(df.loc[mask, column].iloc[0])\n    return \"NOT FOUND\"\n\n\n@interface\ndef query_column(table_id: str, column: str) -> list[str]:\n    \"\"\"Return all values in a given column as a list of strings.\n\n    Returns an empty list if the column name is not found.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    if column in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Wrapper that converts inputs for the PoT interface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identify_operation(question, schema)\n\n    # Use extract_relevant_values with the full table text to determine\n    # which values are needed, then compute\n    values = extract_relevant_values(question, query_table(table_id))\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\n# ------------ e: the table as pipe-delimited text (header row + data rows)\n      table_id: identifier for looking up the table via tool interfaces\n      choices: list of answer options for multi-choice, or None for free-text\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Shared reasoning interfaces (used by both Option A and Option B)\n# ---------------------------------------------------------------\n\n@interface\ndef identify_operation(question: str, table_description: str) -> str:\n    \"\"\"Determine what math operation is needed to answer the question.\n\n    Given the question and a description of the table (column names,\n    row count, title), identify the operation: lookup, sum, difference,\n    average, count, comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer(operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    Arguments:\n      operation: the operation to perform (e.g. \"sum\", \"average\", \"difference\")\n      values: the numeric or text values extracted from the table\n\n    Return the computed result as a string.\n    \"\"\"\n\n\n@interface\ndef format_answer(result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option A: in-context table interfaces\n# ---------------------------------------------------------------\n\n@interface\ndef extract_relevant_values(question: str, table: str) -> list[str]:\n    \"\"\"Given the full table in context, extract the specific values\n    needed to answer the question.\n\n    Read the table carefully, identify which rows and columns are\n    relevant to the question, and return their values as a list\n    of strings.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option B: tool-based table access interfaces (direct implementations)\n# ---------------------------------------------------------------\n\n@interface\ndef get_table_schema(table_id: str) -> str:\n    \"\"\"Return the table schema: column names, row count, and table title.\n\n    Does NOT return actual data values. Use lookup_value or query_column\n    to retrieve data.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    title = info[\"table_title\"] or \"(no title)\"\n    columns = \", \".join(df.columns.tolist())\n    return f\"Title: {title}\\nColumns: {columns}\\nRows: {len(df)}\"\n\n\n@interface\ndef lookup_value(table_id: str, row_label: str, column: str) -> str:\n    \"\"\"Look up a specific cell value by row label and column name.\n\n    The row_label is matched against the first column of the table.\n    Returns the cell value as a string, or 'NOT FOUND' if no match.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    first_col = df.columns[0]\n    mask = df[first_col].str.strip().str.lower() == row_label.strip().lower()\n    if mask.any() and column in df.columns:\n        return str(df.loc[mask, column].iloc[0])\n    return \"NOT FOUND\"\n\n\n@interface\ndef query_column(table_id: str, column: str) -> list[str]:\n    \"\"\"Return all values in a given column as a list of strings.\n\n    Returns an empty list if the column name is not found.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    if column in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when le(table_id))\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\n# ---------------------------------------------------------------\n# Workflow improvement experiments\n# ---------------------------------------------------------------\n\n# --- Experiment: workflow_broad (fewer, broader ptools) ---\n\n@interface\ndef extract_and_compute(question: str, table: str) -> str:\n    \"\"\"Given a question and a table, extract the relevant values and\n    compute the answer in a single step.\n\n    Read the table carefully, determine what operation is needed\n    (lookup, sum, difference, average, count, comparison, etc.),\n    extract the relevant values, perform the calculation, and return\n    the result as a string.\n\n    Return ONLY the computed value, no units or explanation.\n    \"\"\"\n\n\ndef broad_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"2-step workflow: extract_and_compute -> format_answer.\"\"\"\n    result = extract_and_compute(question, table)\n    return format_answer(result, choices)\n\n\n# --- Experiment: workflow_rich (full context at every step) ---\n\n@interface\ndef identify_operation_rich(question: str, table: str) -> str:\n    \"\"\"Given the full question and table, determine what math operation\n    is needed to answer the question.\n\n    Read both the question and the table data carefully.\n    Identify the operation: lookup, sum, difference, average, count,\n    comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer_rich(question: str, table: str, operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    You also receive the original question and table for full context.\n    Use this context to resolve ambiguities (e.g., if the question asks for a name/label \n    instead of a number, if it requires mult d.DataFrame(info[\"table_for_pd\"])\n    if column in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Wrapper that converts inputs for the PoT interface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identify_operation(question, schema)\n\n    # Use extract_relevant_values with the full table text to determine\n    # which values are needed, then compute\n    values = extract_relevant_values(question, query_table(table_id))\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\n# ---------------------------------------------------------------\n# Workflow improvement experiments\n# ---------------------------------------------------------------\n\n# --- Experiment: workflow_broad (fewer, broader ptools) ---\n\n@interface\ndef extract_and_compute(question: str, table: str) -> str:\n    \"\"\"Given a question and a table, extract the relevant values and\n    compute the answer in a single step.\n\n    Read the table carefully, determine what operation is needed\n    (lookup, sum, difference, average, count, comparison, etc.),\n    extract the relevant values, perform the calculation, and return\n    the result as a string.\n\n    Return ONLY the computed value, no units or explanation.\n    \"\"\"\n\n\ndef broad_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"2-step workflow: extract_and_compute -> format_answer.\"\"\"\n    result = extract_and_compute(question, table)\n    return format_answer(result, choices)\n\n\n# --- Experiment: workflow_rich (full context at every step) ---\n\n@interface\ndef identify_operation_rich(question: str, table: str) -> str:\n    \"\"\"Given the full question and table, determine what math operation\n    is needed to answer the question.\n\n    Read both the question and the table data carefully.\n    Identify the operation: lookup, sum, difference, average, count,\n    comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer_rich(question: str, table: str, operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    You also receive the original question and table for full context.\n\n    Arguments:\n      question: the original math word problem\n      table: the full table as pipe-delimited text\n      operation: the operation to perform (e.g. \"sum\", \"average\", \"difference\")\n      values: the numeric or text values extracted from the table\n\n    Return the computed result as a string.\n    \"\"\"\n\n\n@interface\ndef format_answer_rich(question: str, table: str, result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    You also receive the original question and table for full context.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\ndef rich_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"4-step workflow where every ptool receives full question + table context.\"\"\"\n    operation = identify_operation_rich(question, table)\n    values = extract_relevant_values(question, table)\n    result = compute_answer_rich(question, table, operation, values)\n    return format_answer_rich(question, table, result, choices)\n\n# --- Auto-generated by orchestration_learner --seed-orchestrate ---\ndef tabmwp_solve_orchestrated_seed(question: str, table: str, table_id: str, choices: list | None) -> str:\n    table_description = get_table_schema(table_id)\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n```\n\n## Performance on training set\n\nPipeline accuracy: 55.7%, avg cost: $0.0004/case, 70 cases\n\nPer-ptool breakdown:\n  compute_answer: cost_frac=22.7%, calls/case=1.0, avg_cost=$0.0001, lift ws are\ndefined at the bottom of this file.\n\"\"\"\n\nimport pandas as pd\n\nfrom secretagent.core import interface\n\n# ---------------------------------------------------------------\n# Table store \u2014 populated at experiment startup by expt.py\n# Maps example id -> {\"table\": str, \"table_for_pd\": dict,\n#                      \"table_title\": str | None}\n# ---------------------------------------------------------------\n\n_TABLE_STORE: dict[str, dict] = {}\n\n\ndef load_table_store(dataset_dict: dict) -> None:\n    \"\"\"Populate the table store from the raw dataset dict.\n\n    Called by expt.py before running experiments.\n    \"\"\"\n    _TABLE_STORE.clear()\n    for ex_id, ex in dataset_dict.items():\n        _TABLE_STORE[ex_id] = {\n            \"table\": ex[\"table\"],\n            \"table_for_pd\": ex[\"table_for_pd\"],\n            \"table_title\": ex.get(\"table_title\"),\n        }\n\n\n# ---------------------------------------------------------------\n# Top-level interface\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem. Return the answer as a string.\n\n    Arguments:\n      question: the math word problem text\n      table: the table as pipe-delimited text (header row + data rows)\n      table_id: identifier for looking up the table via tool interfaces\n      choices: list of answer options for multi-choice, or None for free-text\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Shared reasoning interfaces (used by both Option A and Option B)\n# ---------------------------------------------------------------\n\n@interface\ndef identify_operation(question: str, table_description: str) -> str:\n    \"\"\"Determine what math operation is needed to answer the question.\n\n    Given the question and a description of the table (column names,\n    row count, title), identify the operation: lookup, sum, difference,\n    average, count, comparison, min, max, range, median, or other.\n\n    CRITICAL: If the question implies extra context (e.g., \"buy 6\", \"1/5 of a pound\", \"budget of $55\", or asks for the NAME/LABEL of the max/min instead of the number), APPEND THAT TO THE OPERATION STRING.\n    Examples: \"sum (buy 6)\", \"lookup (multiply by 1/5)\", \"difference (budget $55)\", \"max (return label)\", \"median\".\n    \"\"\"\n\n\n@interface\ndef compute_answer(operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    Arguments:\n      operation: the operation to perform. It may contain extra instructions (e.g. \"sum (buy 6)\", \"max (return label)\", \"budget $50\").\n      values: the numeric or text values extracted from the table.\n\n    CRITICAL:\n    - Follow any extra instructions in the `operation` string.\n    - If returning a label (argmax/argmin), return ONLY the label.\n    - If computing quantities/budgets, perform the required multiplication or subtraction.\n    \n    Return the computed result as a string.\n    \"\"\"\n\n\n@interface\ndef format_answer(result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option A: in-context table interfaces\n# ---------------------------------------------------------------\n\n@interface\ndef extract_relevant_values(question: str, table: str) -> list[str]:\n    \"\"\"Given the full table in context, extract the specific values\n    needed to answer the question.\n\n    Read the table carefully, identify which rows and columns are\n    relevant to the question mn in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Wrapper that converts inputs for the PoT interface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    result = compute_answer(operation, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identif re(dataset_dict: dict) -> None:\n    \"\"\"Populate the table store from the raw dataset dict.\n\n    Called by expt.py before running experiments.\n    \"\"\"\n    _TABLE_STORE.clear()\n    for ex_id, ex in dataset_dict.items():\n        _TABLE_STORE[ex_id] = {\n            \"table\": ex[\"table\"],\n            \"table_for_pd\": ex[\"table_for_pd\"],\n            \"table_title\": ex.get(\"table_title\"),\n        }\n\n\n# ---------------------------------------------------------------\n# Top-level interface\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem. Return the answer as a string.\n\n    Arguments:\n      question: the math word problem text\n      table: the table as pipe-delimited text (header row + data rows)\n      table_id: identifier for looking up the table via tool interfaces\n      choices: list of answer options for multi-choice, or None for free-text\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Shared reasoning interfaces (used by both Option A and Option B)\n# ---------------------------------------------------------------\n\n@interface\ndef identify_operation(question: str, table_description: str) -> str:\n    \"\"\"Determine what math operation is needed to answer the question.\n\n    Given the question and a description of the table (column names,\n    row count, title), identify the operation: lookup, sum, difference,\n    average, count, comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer(operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    Arguments:\n      operation: the operation to perform (e.g. \"sum\", \"average\"). This may also contain the original question context.\n      values: the numeric or text values extracted from the table\n\n    Return the computed result as a string. If the operation string includes question context, use it to correctly handle item quantities, budgets, or argmax/argmin labels.\n    \"\"\"\n\n\n@interface\ndef format_answer(result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option A: in-context table interfaces\n# ---------------------------------------------------------------\n\n@interface\ndef extract_relevant_values(question: str, table: str) -> list[str]:\n    \"\"\"Given the full table in context, extract the specific values\n    needed to answer the question.\n\n    Read the table carefully, identify which rows and columns are\n    relevant to the question, and return their values as a list\n    of strings.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# Option B: tool-based table access interfaces (direct implementations)\n# ---------------------------------------------------------------\n\n@interface\ndef get_table_schema(table_id: str) -> str:\n    \"\"\"Return the table schema: column names, row count, and table title.\n\n    Does NOT return actual data values. Use lookup_value or query_column\n    to retrieve data.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    title = info[\"table_title\"] or \"(no title)\"\n    columns = \", \".join(df.columns.tolist())\n    return f\"Title: {title}\\nColumns: {columns}\\nRows: {len(df)}\"\n\n\n@interface\ndef lookup_value(table_id: str, row_label: str, column: str) -> str:\n    \"\"\"Look up a specific cell value by row label and column name.\n\n    The row_label is matched against the first column of the table.\n    Returns the cell value as a string, or 'NOT FOUND' if no match.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    first_col = df.columns[0]\n    mask = df[first_col].str.strip().str.lower() == row_label.strip().lower()\n    if mask.any() and column in df.columns:\n        return str(df.loc[mask, column].iloc[0])\n    return \"NOT FOUND\"\n\n\n@interface\ndef query_column(table_id: str, column: str) -> list[str]:\n    \"\"\"Return all values in a given column as a list of strings.\n\n    Returns an empty list if the column name is not found.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    df = pd.DataFrame(info[\"table_for_pd\"])\n    if column in df.columns:\n        return df[column].tolist()\n    return []\n\n\n@interface\ndef query_table(table_id: str) -> str:\n    \"\"\"Return the full table as pipe-delimited text.\n\n    Fallback tool when targeted lookups are insufficient.\n    \"\"\"\n    return _TABLE_STORE[table_id][\"table\"]\n\n\n# ---------------------------------------------------------------\n# Answer extraction (for post-processing verbose agent output)\n# ---------------------------------------------------------------\n\n@interface\ndef extract_answer(llm_output: str, choices: list | None) -> str:\n    \"\"\"Extract a clean, concise answer from verbose LLM output.\n\n    The llm_output may contain reasoning, explanation, or prose around\n    the actual answer. Extract just the final answer value.\n\n    If choices is a list, return the matching choice exactly.\n    If choices is None, return the numeric or short text answer only,\n    with no extra words, units, or explanation.\n    \"\"\"\n\n\n# ---------------------------------------------------------------\n# PoT-specific interface (receives table as pandas-ready dict)\n# ---------------------------------------------------------------\n\n@interface\ndef tabmwp_solve_pot(question: str, table_for_pd: dict, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using generated Python code.\n\n    Arguments:\n      question: the math word problem text\n      table_for_pd: a dictionary where keys are column names and values\n        are lists of cell values as strings.\n        Example: {\"Name\": [\"Alice\", \"Bob\"], \"Score\": [\"90\", \"85\"]}\n      choices: list of answer options for multi-choice, or None for free-text\n\n    The table_for_pd dict can be accessed directly:\n      columns = list(table_for_pd.keys())\n      values = table_for_pd[column_name]  # list of strings\n\n    To do arithmetic, convert strings to numbers manually:\n      nums = [statistics.mean([int(v) for v in table_for_pd[\"Score\"]])]\n\n    Call final_answer(result) with the answer as a string.\n    \"\"\"\n\n\ndef pot_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Wrapper that converts inputs for the PoT interface.\n\n    Looks up table_for_pd from the table store and delegates to\n    tabmwp_solve_pot which receives a pandas-ready dict.\n    \"\"\"\n    info = _TABLE_STORE[table_id]\n    return tabmwp_solve_pot(question, info[\"table_for_pd\"], choices)\n\n\n@interface\ndef tabmwp_react(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Solve a TabMWP problem using a ReAct agent with tools, then\n    extract a clean answer from the agent's verbose output.\n    \"\"\"\n    raw_output = tabmwp_solve(question, table, table_id, choices)\n    return extract_answer(raw_output, choices)\n\n\n# ---------------------------------------------------------------\n# Hand-coded workflows\n# ---------------------------------------------------------------\n\ndef incontext_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option A workflow: table passed in-context through ptool arguments.\n\n    table_id is unused here but included to match the top-level signature.\n    \"\"\"\n    lines = table.strip().split(\"\\n\")\n    header = lines[0] if lines else \"\"\n    table_description = f\"Columns: {header} | Rows: {len(lines) - 1}\"\n\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    \n    op_context = f\"{operation} (Question context: {question})\"\n    result = compute_answer(op_context, values)\n    return format_answer(result, choices)\n\n\ndef tools_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"Option B workflow: table accessed via tool-calling interfaces.\n\n    The table argument is available as fallback but the workflow uses\n    tool calls to query the table store via table_id.\n    \"\"\"\n    schema = get_table_schema(table_id)\n    operation = identify_operation(question, schema)\n\n    # Use extract_relevant_values with the full table text to determine\n    # which values are needed, then compute\n    values = extract_relevant_values(question, query_table(table_id))\n    \n    op_context = f\"{operation} (Question context: {question})\"\n    result = compute_answer(op_context, values)\n    return format_answer(result, choices)\n\n\n# ---------------------------------------------------------------\n# Workflow improvement experiments\n# ---------------------------------------------------------------\n\n# --- Experiment: workflow_broad (fewer, broader ptools) ---\n\n@interface\ndef extract_and_compute(question: str, table: str) -> str:\n    \"\"\"Given a question and a table, extract the relevant values and\n    compute the answer in a single step.\n\n    Read the table carefully, determine what operation is needed\n    (lookup, sum, difference, average, count, comparison, etc.),\n    extract the relevant values, perform the calculation, and return\n    the result as a string.\n\n    Return ONLY the computed value, no units or explanation.\n    \"\"\"\n\n\ndef broad_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"2-step workflow: extract_and_compute -> format_answer.\"\"\"\n    result = extract_and_compute(question, table)\n    return format_answer(result, choices)\n\n\n# --- Experiment: workflow_rich (full context at every step) ---\n\n@interface\ndef identify_operation_rich(question: str, table: str) -> str:\n    \"\"\"Given the full question and table, determine what math operation\n    is needed to answer the question.\n\n    Read both the question and the table data carefully.\n    Identify the operation: lookup, sum, difference, average, count,\n    comparison, min, max, range, or other.\n\n    Return a short string naming the operation.\n    \"\"\"\n\n\n@interface\ndef compute_answer_rich(question: str, table: str, operation: str, values: list[str]) -> str:\n    \"\"\"Perform the arithmetic or logical operation on the given values.\n\n    You also receive the original question and table for full context.\n\n    Arguments:\n      question: the original math word problem\n      table: the full table as pipe-delimited text\n      operation: the operation to perform (e.g. \"sum\", \"average\", \"difference\")\n      values: the numeric or text values extracted from the table\n\n    Return the computed result as a string.\n    \"\"\"\n\n\n@interface\ndef format_answer_rich(question: str, table: str, result: str, choices: list | None) -> str:\n    \"\"\"Format the computed result into the final answer.\n\n    You also receive the original question and table for full context.\n\n    If choices is a list (multi-choice question), select the choice\n    that best matches the result. If choices is None (free-text),\n    return the result directly as a clean string (no units, no extra text).\n    \"\"\"\n\n\ndef rich_workflow(question: str, table: str, table_id: str, choices: list | None) -> str:\n    \"\"\"4-step workflow where every ptool receives full question + table context.\"\"\"\n    operation = identify_operation_rich(question, table)\n    values = extract_relevant_values(question, table)\n    result = compute_answer_rich(question, table, operation, values)\n    return format_answer_rich(question, table, result, choices)\n\n# --- Auto-generated by orchestration_learner --seed-orchestrate ---\ndef tabmwp_solve_orchestrated_seed(question: str, table: str, table_id: str, choices: list | None) -> str:\n    table_description = get_table_schema(table_id)\n    operation = identify_operation(question, table_description)\n    values = extract_relevant_values(question, table)\n    \n    op_context = f\"{operation} (Question context: {question})\"\n    result = compute_answer(op_context, values)\n    return format_answer(result, choices)\n</ptools_file>", "outcome": "ROLLED BACK\naccuracy: 55.7% -> 0.0%\ncost: $0.0004 -> $0.0000\nbest so far: 55.7%\n", "iteration_history": "Iter 0: train=55.7%, eval=50.0% \u2014 KEPT\nIter 1: train=0.0%, eval=0.0% \u2014 ROLLED BACK\n  What was tried: An analysis of the failure cases reveals a consistent structural flaw in the orchestrated workflow: **`compute_answer` is blind to the original question and table.** \n\nBecause it only receives `operation` (e.g., \"sum\", \"max\", \"comparison\") and the extracted `values` (e.g., `['$0.55', '$0.70']`), it has no way to know:\n1. That it needs to multiply those prices by quantities specified in the question (e.g. \"buy 6 items\").\n2. That a \"max\" operation was asking for the *name* of the person/day (argmax), not the maximum numeric value.\n3. What the values represent for comparisons (e.g. comparing demand vs supply to output \"surplus\" instead of just evaluating raw numbers).\n4. That it's a stem-and-leaf plot requiring stem/leaf concatenation.\n\nTo fix this systematically without blowing up the workflow control flow, we can make a **targeted surgical change**:\n1. Update `compute_answer`'s signature to take `question` and `table` for full context, and instruct it on how // --- Populate table ---
const tbody = document.getElementById('iterTable');
DATA.forEach(d => {
  const status = d.kept ? (d.iteration === 0 ? 'BASELINE' : 'KEPT') : 'ROLLBACK';
  const cls = d.kept ? (d.iteration === 0 ? 'baseline' : 'kept') : 'rollback';

  tr.innerHTML = `<td>${d.iteration}</td>
    <td>${(d.train_accuracy * 100).toFixed(1)}%</td>
    <td>${d.train_failures || 0}</td>

    <td>${d.train_cost ? '$' + d.train_cost.toFixed(4) : '—'}</td>

// --- Populate details ---
const details = document.getElementById('iterDetails');
function makeSection(title, content, startOpen) {
  if (!content || content === '(no changes)') return '';
  const id = 'sec_' + Math.random().toString(36).substr(2);
  const openCls = startOpen ? 'open' : '';
  let escaped = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (title.includes('Diff')) {
    escaped = escaped.split('\n').map(line => {
      if (line.startsWith('+') && !line.startsWith('+++')) return `<span class="diff-add">${line}</span>`;
      if (line.startsWith('-') && !line.startsWith('---')) return `<span class="diff-del">${line}</span>`;
      if (line.startsWith('@@')) return `<span class="diff-hdr">${line}</span>`;
      return line;
    }).join('\n');
  }
  return `<div class="section">
    <div class="section-title" onclick="document.getElementById('${id}').classList.toggle('open');
      this.textContent = this.textContent.startsWith('▸') ?
        '▾' + this.textContent.slice(1) : '▸' + this.textContent.slice(1);">
      ${startOpen ? '▾' : '▸'} ${title} (${content.length > 1000 ? (content.length/1024).toFixed(0) + 'KB' : content.length + ' chars'})
    </div>
    <div id="${id}" class="section-content ${openCls}"><pre>${escaped}</pre></div>
  </div>`;
}

DATA.forEach(d => {
  const status = d.kept ? (d.iteration === 0 ? 'BASELINE' : 'KEPT') : 'ROLLBACK';
  const tagCls = d.kept ? (d.iteration === 0 ? 'tag-base' : 'tag-kept') : 'tag-roll';
  const evalStr = d.eval_accuracy !== null ? ` | eval: ${(d.eval_accuracy*100).toFixed(1)}%` : '';
  const div = document.createElement('div');
  div.className = 'iter-detail';
  div.innerHTML = `
    <div class="iter-header" onclick="this.classList.toggle('open');
      this.nextElementSibling.classList.toggle('open');">
      <span><strong>Iteration ${d.iteration}</strong> — train: ${(d.train_accuracy*100).toFixed(1)}%${evalStr}

      <span class="arrow">▸</span>
    </div>

// --- Chart (simple canvas) ---
const canvas = document.getElementById('accChart');
const ctx = canvas.getContext('2d');
function drawChart() {
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = 300;
  const pad = { t: 30, r: 20, b: 40, l: 55 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  const n = DATA.length;
  if (n < 2) return;
  const allAcc = [...DATA.map(d => d.train_accuracy),
                   ...DATA.filter(d=>d.eval_accuracy!==null).map(d=>d.eval_accuracy)];
  const maxAcc = Math.min(1.0, Math.max(...allAcc) + 0.05);
  const minAcc = Math.max(0, Math.min(...allAcc) - 0.05);

  function x(i) { return pad.l + (i / (n - 1)) * cw; }
  function y(v) { return pad.t + (1 - (v - minAcc) / (maxAcc - minAcc)) * ch; }

  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1;
  const step = (maxAcc - minAcc) > 0.3 ? 0.1 : 0.05;
  for (let v = Math.ceil(minAcc/step)*step; v <= maxAcc; v += step) {
    ctx.beginPath(); ctx.moveTo(pad.l, y(v)); ctx.lineTo(W-pad.r, y(v)); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((v*100).toFixed(0)+'%', pad.l-8, y(v)+4);
  }
  ctx.textAlign = 'center';
  DATA.forEach((d,i) => { ctx.fillText(d.iteration, x(i), H-pad.b+18); });
  ctx.fillText('Iteration', W/2, H-5);

  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  DATA.forEach((d,i) => { i === 0 ? ctx.moveTo(x(i), y(d.train_accuracy)) : ctx.lineTo(x(i), y(d.train_accuracy)); });
  ctx.stroke();

  const evalData = DATA.filter(d => d.eval_accuracy !== null);
  if (evalData.length > 1) {
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    evalData.forEach((d,i) => {
      const xi = x(DATA.indexOf(d));
      i === 0 ? ctx.moveTo(xi, y(d.eval_accuracy)) : ctx.lineTo(xi, y(d.eval_accuracy));
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  DATA.forEach((d,i) => {
    ctx.fillStyle = d.kept ? '#3fb950' : '#f85149';
    ctx.beginPath(); ctx.arc(x(i), y(d.train_accuracy), 5, 0, Math.PI*2); ctx.fill();
    if (d.eval_accuracy !== null) {
      ctx.fillStyle = '#f0883e';
      ctx.beginPath(); ctx.arc(x(DATA.indexOf(d)), y(d.eval_accuracy), 4, 0, Math.PI*2); ctx.fill();
    }
  });

  ctx.font = '12px sans-serif';
  const lx = pad.l + 10, ly = pad.t + 10;
  ctx.fillStyle = '#58a6ff'; ctx.fillRect(lx, ly, 16, 3); ctx.fillText('Train', lx+22, ly+5);
  if (evalData.length > 0) {
    ctx.fillStyle = '#f0883e'; ctx.fillRect(lx, ly+16, 16, 3); ctx.fillText('Eval', lx+22, ly+21);
  }
  ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(lx+100, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c9d1d9'; ctx.fillText('Kept', lx+110, ly+5);
  ctx.fillStyle = '#f85149'; ctx.beginPath(); ctx.arc(lx+150, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillText('Rollback', lx+160, ly+5);
}
drawChart();
window.addEventListener('resize', drawChart);
