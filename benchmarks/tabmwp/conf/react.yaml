# ReAct agent: pydantic-ai agent with reasoning + table-access tools.
# tabmwp_solve runs the React loop (returns verbose prose because pydantic-ai's
# str output_type doesn't enforce final_result). tabmwp_react wraps it with an
# LLM-based extractor (extract_answer, on a cheap model) to coerce the prose
# into a clean answer.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: react
  result_dir: results
  record_details: true
  entry_point: tabmwp_react

dataset:
  split: test
  shuffle_seed: 42
  n: 100

ptools:
  identify_operation:
    method: simulate
  compute_answer:
    method: simulate
  format_answer:
    method: simulate
  extract_answer:
    method: simulate
  get_table_schema:
    method: direct
  lookup_value:
    method: direct
  query_column:
    method: direct
  query_table:
    method: direct
  tabmwp_solve:
    method: simulate_pydantic
    tools:
      - ptools.identify_operation
      - ptools.compute_answer
      - ptools.format_answer
      - ptools.get_table_schema
      - ptools.lookup_value
      - ptools.query_column
      - ptools.query_table
  tabmwp_react:
    method: direct
