llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  thinking: true
orchestrate:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_retries: 3
cachier:
  cache_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr/llm_cache
  enable_caching: true
echo:
  orchestrate: true
evaluate:
  expt_name: test_deepseek_v3_1
  result_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/orchestrator-results/existing_workflow/musr_team
  entry_point: answer_question
  record_details: true
  max_workers: 4
dataset:
  split: team_allocation_test
  shuffle_seed: 42
  'n': null
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  answer_question:
    method: direct
