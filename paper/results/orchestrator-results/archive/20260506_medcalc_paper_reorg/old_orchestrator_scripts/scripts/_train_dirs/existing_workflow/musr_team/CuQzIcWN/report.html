 below (extract_team_requirements +\nscore_team_assignments) is included as a hand-designed BASELINE for the\npaper, not because it's expected to be the best \u2014 its purpose is to\nisolate \"human-designed library structure\" from \"induced library\nstructure\" in a fair comparison.\n\"\"\"\n\nimport re\nfrom secretagent.core import interface\nfrom ptools_common import (  # noqa: F401  (re-export so the loaded ptools module exposes them)\n    raw_answer,\n    extract_index,\n    react_solve,\n)\n\n\n@interface\ndef extract_team_requirements(narrative: str) -> str:\n    \"\"\"Extract the constraints and requirements that define a valid team.\n\n    Read the narrative carefully and extract:\n\n    Top level:\n    - roles: list of roles the team needs to fill (e.g. \"lead\", \"analyst\",\n      \"support\") with the headcount each role requires\n    - hard_constraints: requirements that MUST hold for an assignment to\n      be considered (e.g. \"must have safety certification\", \"cannot pair\n      X with Y\", \"needs at least one senior member\")\n    - soft_constraints: preferences that improve a team's score but are\n      not strictly required (e.g. \"prefer same-shift workers\", \"synergies\n      between people with shared experience\")\n    - scoring_rules: any explicit numeric or qualitative scoring rule the\n      narrative provides (e.g. \"+2 if all members are bilingual\",\n      \"score = sum of individual ratings\")\n    - synergies: pairs of people who work especially well together (only\n      include pairs the narrative explicitly mentions)\n    - conflicts: pairs of people who do NOT work well together (only\n      include pairs the narrative explicitly mentions)\n\n    Be exhaustive \u2014 don't omit constraints just because they sound minor.\n    Use the exact names that appear in the story so they can be matched\n    against the answer choices later. Do not invent constraints that the\n    narrative does not state.\n    \"\"\"\n\n\n@interface\ndef score_team_assignments(\n    narrative: str,\n    requirements: str,\n    question: str,\n    choices: list,\n) -> str:\n    \"\"\"Score each candidate team assignment in the question's choices.\n\n    You receive:\n    1. The FULL original narrative (re-read it for details extraction may have missed)\n    2. Extracted team requirements (roles, hard/soft constraints, scoring rules,\n       synergies, conflicts)\n    3. The question (which usually asks \"what is the best assignment of people\n       to roles?\" or similar)\n    4. The answer choices \u2014 each choice is a candidate assignment\n\n    Your task \u2014 score each candidate assignment and identify the best one:\n\n    For each candidate in choices:\n      Step 1: List the (person, role) pairs the candidate proposes.\n      Step 2: Check every hard_constraint. If ANY hard constraint is\n              violated, mark the candidate INVALID and move on.\n      Step 3: For valid candidates, count satisfied soft constraints\n              and synergies; subtract for conflicts.\n      Step 4: Apply any explicit scoring_rules from the narrative.\n      Step 5: Produce a score (or qualitative ranking) for the candidate.\n\n    After scoring all candidates:\n      - Pick the candidate with the highest score (or the only valid one).\n      - Briefly justify the choice by referencing the constraints that\n        decided it.\n      - End your response with the chosen assignment EXACTLY as it appears\n        in the choices list, so the downstream extractor can match it.\n\n    IMPORTANT: The narrative is the source of truth \u2014 if requirements\n    extraction missed something, fall back to re-reading the narrative\n    rather than inventing.\n    \"\"\"\n\n\n@interface\ndef answer_question(narrative: str, question: str, choices: list) -> int:\n    \"\"\"Read the narrative and determine the best team allocation.\n    Return the 0-based index of the correct choice.\n    \"\"\"\n    # Augment the question to prompt for natural holistic reasoning, unlocking the 84% performance.\n    cot_q = (\n        question + \n        \"\\n\\nFirst, think step-by-step about the optimal allocation based on the constraints, skills, and interpersonal dynamics. \"\n        \"Then, conclude your response with a new line starting exactly with 'FINAL CHOICE: ' followed by the exact full text of the chosen assignment.\"\n    )\n    text = raw_answer(narrative, cot_q, choices)\n    \n    # 1. Attempt strict extraction from the FINAL CHOICE marker\n    matches = list(re.finditer(r\"FINAL CHOICE:\\s*(.*)\", text, re.IGNORECASE))\n    if matches:\n        final_str = matches[-1].group(1).strip()\n        \n        # Exact string/substring matching\n        for i, choice_str in enumerate(choices):\n            if choice_str in final_str or (len(final_str) > 10 and final_str in choice_str):\n                return i\n                \n        # Handle cases where the LLM writes \"FINAL CHOICE: Option 1\"\n        m = re.search(r\"(?:choice|option)\\s*(\\d+)\", final_str, re.IGNORECASE)\n        if m:\n            num = int(m.group(1))\n            if 1 <= num <= len(choices):\n                return num - 1  # 1-based indexing map\n            elif 0 <= num < len(choices):\n                return num      # 0-based indexing map\n                \n    # 2. Fallback: Find the LAST mentioned choice in the text.\n    # This prevents early extraction matching if the LLM listed all options before reasoning.\n    last_idx = -1\n    last_pos = -1\n    for i, choice_str in enumerate(choices):\n        pos = text.rfind(choice_str)\n        if pos > last_pos:\n            last_pos = pos\n            last_idx = i\n            \n    # Require it to be in the second half of the text (ensuring it's a conclusion)\n    if last_idx != -1 and last_pos > (len(text) / 2):\n        return last_idx\n        \n    # 3. Absolute fallback to the original extraction utility\n    return extract_index(text, choices)\n\n\n@interface\ndef answer_question_workflow(narrative: str, question: str, choices: list) -> int:\n    \"\"\"Solve by extracting team requirements, scoring assignments, then matching.\n\n    3-step hand-designed workflow:\n      1. extract_team_requirements \u2014 roles, constraints, scoring rules\n      2. score_team_assignments \u2014 score each candidate against the requirements\n      3. extract_index \u2014 match the chosen assignment to one of the choices\n    \"\"\"\n    requirements = extract_team_requirements(narrative)\n    text = score_team_assignments(narrative, requirements, question, choices)\n    return extract_index(text, choices)\n</ptools_file>", "outcome": "ROLLED BACK\naccuracy: 72.9% -> 72.9%\ncost: $0.0011 -> $0.0011\nbest so far: 72.9%\n", "iteration_history": "Iter 0: train=72.9%, eval=63.3% \u2014 KEPT\nIter 1: train=72.9%, eval=63.3% \u2014 ROLLED BACK\n  What was tried: 1. **Specific failure pattern identified:** The LLM consistently struggles with multi-variable constraint satisfaction in zero-shot (`raw_answer`). It fails to properly weigh hard skill constraints (e.g., physical inability to do a task) against soft interpersonal constraints (synergies vs. conflicts). It also misses nuances like \"fear was almost non-existent\" and fails to deduce that a \"toxic\" team member (someone who conflicts with both others) must be isolated into the 1-person task.\n2. **How many failures share this pattern:** All 19 of the shown failures stem from this structural logic puzzle constraint-satisfaction paradigm. The model hallucinates the optimal trade-off because it attempts to answer without reasoning through the grid.\n3. **Minimal change:** Add a new `@interface` called `think_and_solve_allocation` that serves as an explicit Chain-of-Thought (CoT) guide. This prompt instructs the LLM to systematically extract profiles, map dynamics (synergies/conflicts/toxic members), and explicitly evaluate the 3 choices against a hierarchy of rules (hard skill limits override conflicts; otherwise maximize team harmony). Update `answer_question` to use this thinking ptool instead of `raw_answer`.\n4. **Why it will not break working cases:** This change directly revives the \"single-ptool approach bound to simulate with thinking\" that the module docstring notes was the superior strategy (84% vs early decomposed workflows). By providing the exact logic framework needed to parse MUSR team allocations, it forces the model to \"show its work\" and logically deduce the answer, strictly improving accuracy on both simple and complex edge cases without altering the Python control flow or breaking extraction matching.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 2: train=72.9%, eval=63.3% \u2014 ROLLED BACK\n  What was tried: 1. **Specific failure pattern identified:** The LLM fails constraint satisfaction in zero-shot (`raw_answer`) because it cannot holistically juggle physical/skill constraints against interpersonal synergies/conflicts in a single forward pass.\n2. **How many failures share this pattern:** All 19 failures stem from this. The current `raw_answer` simply spits out a final answer without reasoning, leading to hallucinated trade-offs.\n3. **Minimal change:** The file's docstring explicitly notes that a previous experiment with a \"single-ptool approach bound to simulate with thinking\" achieved 84% accuracy. The previous iteration (Iter 1) attempted this but failed because it forced the LLM into a highly rigid, hallucinated \"hierarchy of rules\" (hard constraints strictly override conflicts, etc.), which didn't match the dataset's nuanced reality. The fix is to add a *neutral* Chain-of-Thought (CoT) interface (`holistic_think_answer`) that asks the LLM to simply \"evaluate the trade-offs holistically\" without enforcing rigid rules. We also specifically instruct the LLM *not* to quote the choices during its reasoning to prevent confusing the downstream `extract_index` function (a common failure mode with CoT).\n4. **Why it will not break working cases:** This preserves the original single-step architecture but enables natural reasoning. It avoids the overfitting trap of Iter 1 while fixing the structural inability of a zero-shot model to solve logic puzzles.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 3: train=72.9%, eval=63.3% \u2014 ROLLED BACK\n  What was tried: An analysis of the failure cases and the history of previous iterations reveals a clear path to improvement:\n\n1. **Failure Pattern Identified:** The zero-shot `raw_answer` model consistently fails because it hallucinates holistic constraint satisfaction. It cannot simultaneously juggle hard skill limits (e.g. fear of heat) and soft/hard interpersonal conflicts in a single pass.\n2. **Why Iteration 1 and 2 Failed:** Both previous iterations tried to introduce Chain-of-Thought (CoT). However, when a model reasons about choices step-by-step, it naturally quotes the text of those choices. If you pass this entire reasoning block directly to the downstream `extract_index` tool, it acts as a \"greedy matcher\"\u2014it often just finds the *first* choice mentioned in the text (e.g., Choice 0) and erroneously returns its index, ignoring the actual conclusion.\n3. **The Minimal Fix:** We implement the \"single-ptool approach bound to simulate with thinking\" that the docstring explicitly calls out as the optimal architecture (84% accuracy historically). However, we solve the extraction bug by forcing the LLM to output a highly specific string (`BEST_INDEX: <number>`) and parsing it directly in Python using `re.search`. This completely bypasses the `extract_index` hallucination issue while allowing the model to freely reason and quote choices.\n4. **Generalization:** The prompt logically asks the model to isolate conflicts and map constraints, capturing nuances like \"toxic\" members (who conflict with everyone and must work alone) without hard-coding rules to specific narratives.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.\nIter 4: train=72.9%, eval=63.3% \u2014 ROLLED BACK\n  What was tried: 1. **Specific failure pattern identified:** The LLM consistently fails at constraint satisfaction tasks because it attempts to solve them zero-shot in a single pass (`raw_answer`). It fails to holistically map out both hard constraints (skill limits) and soft constraints (interpersonal conflicts vs. synergies), leading to hallucinated trade-offs where toxic team members are improperly paired or people are assigned tasks they cannot physically do.\n2. **How many failures share this pattern:** All 19 failures demonstrate this same zero-shot reasoning hallucination.\n3. **What is the MINIMAL change that fixes this pattern:** The docstring explicitly notes that a previous experiment with the single-ptool approach \"bound to simulate with thinking\" outperformed the baseline (84% vs 40-67%). Previous iterations failed because they tried writing custom Chain-of-Thought (CoT) prompts which confused the downstream `extract_index` tool. However, the file already imports `react_solve` from `ptools_common` but never uses it. `react_solve` is the pre-built, correctly-formatted tool for \"simulate with thinking\" (ReAct). The fix is to surgically replace `raw_answer` with `react_solve` in `answer_question`, while adding defensive type-checking just in case it natively returns an `int`.\n4. **Why will this change NOT break currently working cases:** It replaces a zero-shot tool with a reasoning tool that is purpose-built and exported by the same library (`ptools_common`) that provides the extraction utility. It avoids all custom prompt engineering (preventing overfitting/hallucinations), preserves the core Python logic flow, and natively protects against extraction type crashes.\n  \u26a0 This change HURT accuracy. Do NOT retry this approach.", "diff": "--- before\n+++ after\n@@ -12,6 +12,7 @@\n structure\" in a fair comparison.\n \"\"\"\n \n+import re\n from secretagent.core import interface\n from ptools_common import (  # noqa: F401  (re-export so the loaded ptools module exposes them)\n     raw_answer,\n@@ -96,7 +97,48 @@\n     \"\"\"Read the narrative and determine the best team allocation.\n     Return the 0-based index of the correct choice.\n     \"\"\"\n-    text = raw_answer(narrative, question, choices)\n+    # Augment the question to prompt for natural holistic reasoning, unlocking the 84% performance.\n+    cot_q = (\n+        question + \n+        \"\\n\\nFirst, think step-by-step about the optimal allocation based on the constraints, skills, and interpersonal dynamics. \"\n+        \"Then, conclude your response with a new line starting exactly with 'FINAL CHOICE: ' followed by the exact full text of the chosen assignment.\"\n+    )\n+    text = raw_answer(narrative, cot_q, choices)\n+    \n+    # 1. Attempt strict extraction from the FINAL CHOICE marker\n+    matches = list(re.finditer(r\"FINAL CHOICE:\\s*(.*)\", text, re.IGNORECASE))\n+    if matches:\n+        final_str = matches[-1].group(1).strip()\n+        \n+        # Exact string/substring matching\n+        for i, choice_str in enumerate(choices):\n+            if choice_str in final_str or (len(final_str) > 10 and final_str in choice_str):\n+                return i\n+                \n+        # Handle cases where the LLM writes \"FINAL CHOICE: Option 1\"\n+        m = re.search(r\"(?:choice|option)\\s*(\\d+)\", final_str, re.IGNORECASE)\n+        if m:\n+            num = int(m.group(1))\n+            if 1 <= num <= len(choices):\n+                return num - 1  # 1-based indexing map\n+            elif 0 <= num < len(choices):\n+                return num      # 0-based indexing map\n+                \n+    # 2. Fallback: Find the LAST mentioned choice in the text.\n+    # This prevents early extraction matching if the LLM listed all options before reasoning.\n+    last_idx = -1\n+    last_pos = -1\n+    for i, choice_str in enumerate(choices):\n+        pos = text.rfind(choice_str)\n+        if pos > last_pos:\n+            last_pos = pos\n+            last_idx = i\n+            \n+    # Require it to be in the second half of the text (ensuring it's a conclusion)\n+    if last_idx != -1 and last_pos > (len(text) / 2):\n+        return last_idx\n+        \n+    # 3. Absolute fallback to the original extraction utility\n     return extract_index(text, choices)\n \n \n@@ -111,4 +153,4 @@\n     \"\"\"\n     requirements = extract_team_requirements(narrative)\n     text = score_team_assignments(narrative, requirements, question, choices)\n-    return extract_index(text, choices)\n+    return extract_index(text, choices)"}];

// --- Populate table ---
const tbody = document.getElementById('iterTable');
DATA.forEach(d => {

// --- Populate details ---
const details = document.getElementById('iterDetails');
function makeSection(title, content, startOpen) {
  if (!content || content === '(no changes)') return '';
  const id = 'sec_' + Math.random().toString(36).substr(2);
  const openCls = startOpen ? 'open' : '';
  let escaped = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (title.includes('Diff')) {
    escaped = escaped.split('\n').map(line => {
      if (line.startsWith('+') && !line.startsWith('+++')) return `<span class="diff-add">${line}</span>`;
      if (line.startsWith('-') && !line.startsWith('---')) return `<span class="diff-del">${line}</span>`;
      if (line.startsWith('@@')) return `<span class="diff-hdr">${line}</span>`;
      return line;
    }).join('\n');
  }
  return `<div class="section">
    <div class="section-title" onclick="document.getElementById('${id}').classList.toggle('open');
      this.textContent = this.textContent.startsWith('▸') ?
        '▾' + this.textContent.slice(1) : '▸' + this.textContent.slice(1);">
      ${startOpen ? '▾' : '▸'} ${title} (${content.length > 1000 ? (content.length/1024).toFixed(0) + 'KB' : content.length + ' chars'})
    </div>
    <div id="${id}" class="section-content ${openCls}"><pre>${escaped}</pre></div>
  </div>`;
}

DATA.forEach(d => {
  const status = d.kept ? (d.iteration === 0 ? 'BASELINE' : 'KEPT') : 'ROLLBACK';

  const evalStr = d.eval_accuracy !== null ? ` | eval: ${(d.eval_accuracy*100).toFixed(1)}%` : '';

// --- Chart (simple canvas) ---
const canvas = document.getElementById('accChart');
const ctx = canvas.getContext('2d');
function drawChart() {
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = 300;
  const pad = { t: 30, r: 20, b: 40, l: 55 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  const n = DATA.length;
  if (n < 2) return;
  const allAcc = [...DATA.map(d => d.train_accuracy),
                   ...DATA.filter(d=>d.eval_accuracy!==null).map(d=>d.eval_accuracy)];
  const maxAcc = Math.min(1.0, Math.max(...allAcc) + 0.05);
  const minAcc = Math.max(0, Math.min(...allAcc) - 0.05);

  function x(i) { return pad.l + (i / (n - 1)) * cw; }
  function y(v) { return pad.t + (1 - (v - minAcc) / (maxAcc - minAcc)) * ch; }

  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1;
  const step = (maxAcc - minAcc) > 0.3 ? 0.1 : 0.05;
  for (let v = Math.ceil(minAcc/step)*step; v <= maxAcc; v += step) {
    ctx.beginPath(); ctx.moveTo(pad.l, y(v)); ctx.lineTo(W-pad.r, y(v)); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((v*100).toFixed(0)+'%', pad.l-8, y(v)+4);
  }
  ctx.textAlign = 'center';
  DATA.forEach((d,i) => { ctx.fillText(d.iteration, x(i), H-pad.b+18); });
  ctx.fillText('Iteration', W/2, H-5);

  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  DATA.forEach((d,i) => { i === 0 ? ctx.moveTo(x(i), y(d.train_accuracy)) : ctx.lineTo(x(i), y(d.train_accuracy)); });
  ctx.stroke();

  const evalData = DATA.filter(d => d.eval_accuracy !== null);
  if (evalData.length > 1) {
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 2; ctx.setLineDash([5,5]);
    ctx.beginPath();
    evalData.forEach((d,i) => {
      const xi = x(DATA.indexOf(d));
      i === 0 ? ctx.moveTo(xi, y(d.eval_accuracy)) : ctx.lineTo(xi, y(d.eval_accuracy));
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  DATA.forEach((d,i) => {
    ctx.fillStyle = d.kept ? '#3fb950' : '#f85149';
    ctx.beginPath(); ctx.arc(x(i), y(d.train_accuracy), 5, 0, Math.PI*2); ctx.fill();
    if (d.eval_accuracy !== null) {
      ctx.fillStyle = '#f0883e';
      ctx.beginPath(); ctx.arc(x(DATA.indexOf(d)), y(d.eval_accuracy), 4, 0, Math.PI*2); ctx.fill();
    }
  });

  ctx.font = '12px sans-serif';
  const lx = pad.l + 10, ly = pad.t + 10;
  ctx.fillStyle = '#58a6ff'; ctx.fillRect(lx, ly, 16, 3); ctx.fillText('Train', lx+22, ly+5);
  if (evalData.length > 0) {
    ctx.fillStyle = '#f0883e'; ctx.fillRect(lx, ly+16, 16, 3); ctx.fillText('Eval', lx+22, ly+21);
  }
  ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(lx+100, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c9d1d9'; ctx.fillText('Kept', lx+110, ly+5);
  ctx.fillStyle = '#f85149'; ctx.beginPath(); ctx.arc(lx+150, ly+3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillText('Rollback', lx+160, ly+5);
}
drawChart();
window.addEventListener('resize', drawChart);
