llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  thinking: true
orchestrate:
  model: together_ai/deepseek-ai/DeepSeek-V3
  max_retries: 3
cachier:
  cache_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr/llm_cache
  enable_caching: true
echo:
  orchestrate: true
evaluate:
  expt_name: replay_failed
  result_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/orchestrator-results/_replay_patches/seed_from_ptools/musr_object
  entry_point: answer_question_workflow
  record_details: true
  max_workers: 4
dataset:
  split: object_placements_test
  shuffle_seed: 42
  'n': null
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  infer_belief:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
    task_description: 'Determine where a person would look for an object based on
      their beliefs (theory of mind). You receive a narrative about people moving
      objects, a question about where someone would look, and answer choices. Use
      the available tools to infer what the person believes about the object''s location,
      then return the 0-based index of the correct choice.

      '
    fn: __learned__.answer_question_workflow_orchestrated_seed
    learner: orch_learner
  extract_movements:
    method: simulate
  extract_discoveries:
    method: simulate
learn:
  train_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/orchestrator-results/_train_dirs/seed_from_ptools/musr_object
root: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/musr
