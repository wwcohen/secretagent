    fn: ptools.compute_calculation_impl
  simulate_medical_value:
    method: simulate
  calculate_medical_value:
    method: learned_code
    fn: ptools.workflow
    learner: workflow_distill
    backoff: true
learn:
  train_dir: /mnt/d/Aditya/CMU/Research/William_Cohen_Group/Codebase/secretagent/benchmarks/COMMON/codedistill-workflow-results/medcalc/learned_class3_gemini
